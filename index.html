<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Wiki</title>

  <!-- KaTeX: math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <!-- Font Awesome Free (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <!-- marked: Markdown parsing -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

  <style>
    :root {
      --bg-chrome: #f3f4f6;
      --bg-canvas: #5b6066;        /* page area: lighter than the chrome */
      --sidebar: #3a3d42;          /* sidebar + topbar: darker gray */
      --sidebar-soft: #4a5057;
      --sidebar-text: #d2d6dc;
      --sidebar-muted: #969ca6;
      --accent: #2f6df0;
      --border: #e3e6eb;
      --page-w: 210mm;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1b1f24;
      background: var(--bg-chrome);
      overflow: hidden;
    }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .workspace { flex: 1; display: flex; min-height: 0; }

    /* ---------- Sidebar ---------- */
    .sidebar {
      width: 348px;
      flex: 0 0 348px;
      background: var(--sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      border-right: 1px solid #00000033;
    }
    .brand {
      flex: 0 0 348px; width: 348px; height: 100%;
      display: flex; align-items: center; gap: 10px;
      padding: 0 18px; box-sizing: border-box;
      border-right: 1px solid #00000033;
      color: var(--sidebar-text);
      font-weight: 700; font-size: 17px; letter-spacing: .2px;
    }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 19px;
    }
    .new-doc { position: relative; padding: 14px 14px 8px; }
    #newBtn { font-size: 15px; padding: 9px 14px; }
    .menu {
      position: absolute; top: 56px; left: 14px; right: 14px; z-index: 20;
      background: #fff; color: #1b1f24; border-radius: 10px;
      box-shadow: 0 12px 30px #00000040; overflow: hidden; padding: 6px;
    }
    .menu button {
      display: flex; width: 100%; gap: 10px; align-items: center;
      padding: 9px 10px; border: 0; background: transparent;
      font-size: 14px; border-radius: 7px; cursor: pointer; text-align: left;
    }
    .menu button:hover { background: #eef1f6; }
    .hidden { display: none !important; }

    .tree { flex: 1; overflow-y: auto; padding: 6px 8px 24px; }
    .tree-group { margin-bottom: 6px; }
    .tree-group-head {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px 6px; font-size: 12.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px; color: var(--sidebar-muted);
    }
    .tree-group-head .count {
      margin-left: auto; font-weight: 600; opacity: .7;
    }
    .tree-item {
      display: flex; align-items: center;
      padding: 7px 10px 7px 34px; margin: 1px 2px; border-radius: 8px;
      font-size: 15px; cursor: pointer; color: var(--sidebar-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tree-item:hover { background: var(--sidebar-soft); }
    .tree-item.active { background: var(--accent); color: #fff; }
    .tree-item .label { overflow: hidden; text-overflow: ellipsis; }
    .tree-item.draft { font-style: italic; color: #ffd479; }
    .tree-empty { padding: 14px 12px; font-size: 13px; color: var(--sidebar-muted); }
    .side-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .toc-head {
      padding: 14px 16px 8px; font-size: 12.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px; color: var(--sidebar-muted);
    }
    .toc { flex: 1; overflow-y: auto; padding: 2px 8px 16px; }
    .toc-item {
      display: block; padding: 6px 10px; margin: 1px 2px; border-radius: 7px;
      font-size: 14.5px; line-height: 1.4; color: var(--sidebar-text);
      text-decoration: none; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .toc-item:hover { background: var(--sidebar-soft); }
    .toc-item.lvl-1 { font-weight: 700; }
    .toc-item.lvl-2 { padding-left: 26px; }
    .toc-item.lvl-3 { padding-left: 40px; opacity: .82; }
    .toc-num { color: var(--sidebar-muted); font-weight: 600; }
    .toc-item.toc-special { color: var(--sidebar-muted); font-style: italic; }
    .toc-item.toc-special i { width: 18px; text-align: center; }
    .tree-group-head i, .menu button i, .token-btn i { width: 18px; text-align: center; font-size: 15px; }
    .sidebar-foot { padding: 10px 12px; border-top: 1px solid #00000033; }
    .toc-back { padding: 10px 12px; border-bottom: 1px solid #00000033; }
    .toc-doc-title {
      padding: 12px 16px 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15px; font-weight: 400; line-height: 1.3;
      color: var(--sidebar-text); border-radius: 6px; transition: background .1s;
    }
    .toc-doc-title:hover { background: rgba(0,0,0,.06); }
    .token-btn {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border: 0; border-radius: 8px; cursor: pointer;
      background: transparent; color: var(--sidebar-muted);
      font-size: 13.5px; text-align: left;
    }
    .token-btn:hover { background: var(--sidebar-soft); color: var(--sidebar-text); }

    /* ---------- Topbar (full width) ---------- */
    .topbar {
      flex: 0 0 auto; height: 56px;
      display: flex; align-items: center;
      background: var(--sidebar); color: var(--sidebar-text);
      border-bottom: 1px solid #00000026;
    }
    .topbar-content {
      flex: 1; min-width: 0; position: relative;
      display: flex; align-items: center;
      padding: 0 18px;
    }

    /* ---------- Main ---------- */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .doc-name {
      position: absolute; left: 50%; transform: translateX(-50%);
      max-width: 60%; text-align: center; pointer-events: none;
      font-family: "Times New Roman", Georgia, serif;
      font-size: 19px; font-weight: 600; color: var(--sidebar-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-name.muted { font-family: inherit; font-size: 14.5px; font-style: italic; color: var(--sidebar-muted); }
    .actions { margin-left: auto; display: flex; align-items: center; gap: 8px; flex: 0 0 auto; z-index: 1; }
    .btn {
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .08); font-size: 13.5px; font-weight: 600;
      cursor: pointer; color: var(--sidebar-text);
    }
    .btn:hover { background: rgba(255, 255, 255, .16); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #245fd6; }
    .badge {
      font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
      background: #fff4d6; color: #8a6300; border: 1px solid #f0d999;
      text-transform: none; letter-spacing: 0;
    }
    .badge-warn { background: #ffe8e8; color: #a3261f; border-color: #f3c0bc; }

    /* ---------- Canvas / A4 sheet ---------- */
    .canvas {
      flex: 1; overflow: auto; background: var(--bg-canvas);
      padding: 32px 24px 64px; display: flex; justify-content: center;
    }
    .page {
      width: 100%;
      max-width: 1200px;
      min-height: 297mm;
      background: #fff;
      box-shadow: 0 4px 24px #00000059;
      padding: 26mm 30mm;
      align-self: flex-start;
      border-radius: 2px;
    }

    /* "sheet" typography */
    .doc-head { text-align: center; margin-bottom: 26px; }
    .doc-kicker {
      font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #8a909a; font-weight: 600; margin-bottom: 8px;
    }
    .doc-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px; line-height: 1.2; margin: 0; color: #14181d;
    }
    .doc-meta { font-size: 12.5px; color: #9aa0a8; margin-top: 10px; }

    .doc-body {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px; line-height: 1.7; color: #1d2127;
    }
    .doc-body h1, .doc-body h2, .doc-body h3 {
      font-family: Georgia, "Times New Roman", serif; line-height: 1.3;
      margin: 1.6em 0 .5em; color: #14181d;
      font-weight: 400; letter-spacing: .01em;
      text-shadow: 0 0 .3px #14181d;
    }
    .doc-body h1 { font-size: 24px; border-bottom: 1px solid #ebedf0; padding-bottom: .25em; }
    .doc-body h2 { font-size: 19px; }
    .doc-body h3 { font-size: 16.5px; font-style: italic; }
    .doc-body p { margin: 0 0 1em; }
    .doc-body ul, .doc-body ol { margin: 0 0 1em; padding-left: 1.5em; }
    .doc-body li { margin: .25em 0; }
    .doc-body blockquote {
      margin: 1em 0; padding: .4em 1.1em; border-left: 3px solid #d6dae0;
      color: #565d66; font-style: italic;
    }
    .doc-body code {
      font-family: "SFMono-Regular", Consolas, monospace; font-size: .88em;
      background: #f1f3f5; padding: .12em .4em; border-radius: 4px;
    }
    .doc-body pre {
      background: #f6f8fa; padding: 14px 16px; border-radius: 8px;
      overflow-x: auto; border: 1px solid #ebedf0;
    }
    .doc-body pre code { background: none; padding: 0; }
    .doc-body table { border-collapse: collapse; margin: 1em 0; width: 100%; }
    .doc-body th, .doc-body td { border: 1px solid #dfe2e6; padding: 6px 11px; text-align: left; }
    .doc-body th { background: #f6f8fa; }
    .doc-body hr { border: 0; border-top: 1px solid #e7e9ec; margin: 1.8em 0; }
    .doc-body img { max-width: 100%; height: auto; display: block; margin: 1.2em auto; }
    .katex-display { margin: 1.1em 0; overflow-x: auto; overflow-y: hidden; }

    /* ---------- Editor ---------- */
    .title-input {
      width: 100%; border: 0; outline: none;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px; font-weight: 700; color: #14181d;
      margin-bottom: 18px; padding: 0;
    }
    .title-input::placeholder { color: #c2c7ce; }
    .body-input {
      width: 100%; border: 0; outline: none; resize: none;
      font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
      font-size: 14px; line-height: 1.7; color: #1d2127;
      min-height: 220mm; overflow: hidden;
    }
    .body-input::placeholder { color: #c2c7ce; }

    /* ---------- Empty state ---------- */
    .empty {
      text-align: center; color: #aab0b8;
      font-family: Georgia, serif; padding-top: 60px;
    }
    .empty .big { font-size: 54px; margin-bottom: 10px; }
    .empty h2 { color: #767c85; font-weight: 600; margin: 0 0 6px; }

    /* ---------- Toast ---------- */
    #toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1f2430; color: #fff; padding: 11px 18px; border-radius: 10px;
      font-size: 13.5px; box-shadow: 0 8px 24px #0006; opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none; z-index: 50;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---------- editable formulas + modal ---------- */
    .math-edit { cursor: pointer; border-radius: 4px; transition: background .12s, box-shadow .12s; }
    .math-inline { padding: 0 1px; }
    .math-display { display: block; }
    .math-edit:hover { background: #eaf1ff; box-shadow: 0 0 0 3px #eaf1ff; }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 100; padding: 20px;
      background: #00000077; display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: #fff; width: min(640px, 100%); border-radius: 12px;
      box-shadow: 0 24px 70px #00000066; display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-title { padding: 14px 18px; font-weight: 700; font-size: 15px; border-bottom: 1px solid #eef0f3; }
    .math-preview {
      padding: 24px 18px; min-height: 92px; background: #fafbfc;
      border-bottom: 1px solid #eef0f3; overflow-x: auto;
      display: flex; align-items: center; justify-content: center;
    }
    .math-input {
      border: 0; outline: none; resize: vertical; min-height: 96px; padding: 14px 18px;
      font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
      font-size: 14px; line-height: 1.55; color: #1d2127;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px; border-top: 1px solid #eef0f3; }
    /* settings modal */
    .settings-body { padding: 18px 18px 6px; display: flex; flex-direction: column; gap: 14px; }
    .setting-row { display: flex; flex-direction: column; gap: 5px; }
    .setting-row label { font-size: 12px; font-weight: 600; color: #6b737e; letter-spacing: .4px; text-transform: uppercase; }
    .setting-row input[type="text"], .setting-row input[type="color"] {
      border: 1px solid #d4d8df; border-radius: 7px; padding: 8px 11px;
      font-size: 14px; color: #1d2127; outline: none;
      font-family: inherit; background: #fff;
    }
    .setting-row input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #2f6df018; }
    .setting-row input[type="color"] { padding: 4px 6px; height: 36px; width: 100%; cursor: pointer; }
    .setting-row select {
      border: 1px solid #d4d8df; border-radius: 7px; padding: 8px 11px;
      font-size: 14px; color: #1d2127; outline: none;
      font-family: inherit; background: #fff; cursor: pointer;
    }
    .setting-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #2f6df018; }
    .section-num { color: #9aa0a8; font-weight: 400; margin-right: .35em; font-variant-numeric: tabular-nums; }
    .refcode-badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      background: #eef1f7; color: #5a6070; font-size: 11px; font-weight: 700;
      letter-spacing: .5px; font-family: monospace; vertical-align: middle; margin-left: 6px; cursor: default;
    }
    .wiki-ref { color: var(--accent); text-decoration: none; border-bottom: 1px dotted currentColor; }
    .wiki-ref:hover { border-bottom-style: solid; }
    .modal-actions .btn { border: 1px solid #d4d8df; background: #fff; color: #2a2f37; }
    .modal-actions .btn:hover { background: #f5f6f8; }
    .modal-actions .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .modal-actions .btn-primary:hover { background: #245fd6; }

    /* ---------- paginated view (book / paper) ---------- */
    .pages-container {
      display: flex; flex-direction: column; gap: 32px;
      width: 100%; align-items: center; align-self: flex-start;
    }
    .page-sheet {
      width: 100%; max-width: 1200px; min-height: 297mm;
      background: #fff; box-shadow: 0 4px 24px #00000059;
      padding: 26mm 30mm 22mm; position: relative; border-radius: 2px;
    }
    .page-num {
      position: absolute; bottom: 10mm; left: 30mm; right: 30mm;
      text-align: center; font-family: Georgia, "Times New Roman", serif;
      font-size: 11px; color: #c0c6ce; user-select: none;
    }

    /* book cover */
    .page-cover {
      width: 100%; max-width: 1200px; min-height: 297mm;
      background: #fff; box-shadow: 0 4px 24px #00000059;
      border-radius: 2px; display: flex; flex-direction: column; overflow: hidden;
    }
    .cover-release {
      padding: 12mm 30mm 0; font-size: 11px; letter-spacing: 1.8px;
      text-transform: uppercase; color: #c0c6d0; text-align: center;
      font-family: Helvetica, Arial, sans-serif; cursor: text;
    }
    .cover-release:focus { outline: none; color: #8a909a; }
    .cover-body {
      flex: 1; padding: 0 30mm 32px;
      display: flex; flex-direction: column;
    }
    .cover-formula {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #d8dde6; font-size: 320px; pointer-events: none; user-select: none;
      overflow: hidden;
    }
    .cover-formula .katex-display { margin: 0; }
    .cover-title {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 68px; font-weight: 300; line-height: 1.05;
      margin: 0; letter-spacing: -1.5px;
    }
    .cover-band {
      flex: 0 0 calc(297mm / 3); padding: 28px 30mm;
      display: flex; flex-direction: column;
      align-items: flex-end; justify-content: center;
      position: relative;
    }
    .cover-author {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 26px; font-weight: 400; color: rgba(255,255,255,.9);
      text-align: right; cursor: text;
    }
    .cover-author:focus { outline: none; }
    .cover-publisher {
      position: absolute; bottom: 22px; left: 30mm; right: 30mm;
      text-align: center; font-size: 12px; letter-spacing: 2.5px;
      text-transform: uppercase; color: rgba(255,255,255,.9);
      font-family: Helvetica, Arial, sans-serif;
    }

    /* ---------- inline WYSIWYG editing ---------- */
    .inline-editable h1, .inline-editable h2, .inline-editable h3, .inline-editable p {
      cursor: text; border-radius: 3px;
      margin-left: -5px; margin-right: -5px;
      padding-left: 5px; padding-right: 5px;
      transition: background .1s;
    }
    .inline-editable h1:hover, .inline-editable h2:hover,
    .inline-editable h3:hover, .inline-editable p:not(:has(.formula-row)):hover {
      background: rgba(47, 109, 240, .045);
    }
    [contenteditable="true"]:focus {
      outline: none;
      background: rgba(47, 109, 240, .06);
      border-radius: 3px;
    }
    [contenteditable="true"]:focus:has(.formula-row) {
      background: transparent;
    }

    /* ---------- formula row + counter ---------- */
    .formula-row { display: flex; align-items: center; gap: 16px; cursor: pointer; }
    .formula-row .katex-display {
      flex: 1; margin: 0; border-radius: 4px; padding: 4px 6px;
      transition: background .12s;
    }
    .formula-row:hover .katex-display { background: #eaf1ff; }
    .formula-counter {
      flex-shrink: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15px; color: #6b737e; user-select: none;
    }

    @media print {
      .sidebar, .topbar, #toast { display: none !important; }
      .canvas { overflow: visible; background: #fff; padding: 0 !important; }
      .page { box-shadow: none; width: auto; padding: 0; }
      .page-sheet { box-shadow: none !important; border-radius: 0 !important; page-break-after: always; }
      .page-cover { box-shadow: none !important; border-radius: 0 !important; page-break-after: always; }
      .formula-counter { display: none; }
      body { background: #fff !important; }
    }
    /* export dropdown */
    .export-wrap { position: relative; }
    .export-menu {
      position: absolute; top: calc(100% + 8px); right: 0; z-index: 200;
      background: #fff; color: #1b1f24; border-radius: 10px;
      box-shadow: 0 12px 30px #00000040; overflow: hidden; padding: 6px;
      min-width: 220px;
    }
    .export-menu button {
      display: flex; width: 100%; gap: 10px; align-items: center;
      padding: 9px 12px; border: 0; background: transparent;
      font-size: 14px; border-radius: 7px; cursor: pointer; text-align: left; color: #1b1f24;
    }
    .export-menu button i { width: 16px; text-align: center; color: #5a6070; font-size: 14px; }
    .export-menu button:hover { background: #eef1f6; }
    .export-menu button:hover i { color: var(--accent); }
    .export-menu hr { border: none; border-top: 1px solid #eef0f3; margin: 4px 0; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand" id="brandBtn" style="cursor:pointer;" title="Go to Home">
        <span class="brand-mark">M</span>
        <span class="brand-name">Math Wiki</span>
      </div>
      <div id="topbar" class="topbar-content"></div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div id="treeView" class="side-view">
          <div class="new-doc">
            <button id="newBtn" class="btn btn-primary" style="width:100%">+ New</button>
            <div id="newMenu" class="menu hidden">
              <button data-type="page"><i class="fa-solid fa-file"></i> Page</button>
              <button data-type="paper"><i class="fa-solid fa-file-lines"></i> Paper</button>
              <button data-type="book"><i class="fa-solid fa-book"></i> Book</button>
              <button data-type="notes"><i class="fa-solid fa-note-sticky"></i> Notes</button>
            </div>
          </div>
          <nav id="tree" class="tree"></nav>
          <div class="sidebar-foot">
            <button id="tokenBtn" class="token-btn"><i class="fa-solid fa-key"></i> <span id="tokenLabel">Set GitHub token</span></button>
          </div>
        </div>

        <div id="tocView" class="side-view hidden">
          <div class="toc-back">
            <button id="backBtn" class="token-btn"><i class="fa-solid fa-arrow-left"></i> Back to documents</button>
          </div>
          <div id="tocDocTitle" class="toc-doc-title"></div>
          <div class="toc-head">On this page</div>
          <nav id="toc" class="toc"></nav>
        </div>
      </aside>

      <main class="main">
        <div class="canvas">
          <article id="page" class="page"></article>
        </div>
      </main>
    </div>
  </div>
  <div id="toast"></div>

  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title"><i class="fa-solid fa-sliders"></i> Document settings</div>
      <div class="settings-body">
        <div class="setting-row">
          <label>Title</label>
          <input id="stgTitle" type="text" placeholder="Document title" />
        </div>
        <div class="setting-row">
          <label>Author</label>
          <input id="stgAuthor" type="text" placeholder="Anonymous" />
        </div>
        <div class="setting-row">
          <label>Filename in repo (slug)</label>
          <input id="stgSlug" type="text" placeholder="my-document" />
        </div>
        <div class="setting-row">
          <label>Primary color</label>
          <input id="stgColor" type="color" value="#2f6df0" />
        </div>
        <div class="setting-row">
          <label>Reference Code</label>
          <input id="stgRefcode" type="text" placeholder="Auto — e.g. B1, P2, N3" />
        </div>
        <div class="setting-row">
          <label>Section Numbering</label>
          <select id="stgSectionPrefix">
            <option value="">None (default)</option>
            <option value="dot">1. &nbsp;/&nbsp; 1.2. &nbsp;/&nbsp; 1.2.3.</option>
            <option value="nodot">1 &nbsp;/&nbsp; 1.2 &nbsp;/&nbsp; 1.2.3</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button id="stgCancel" class="btn">Cancel</button>
        <button id="stgApply" class="btn btn-primary">Apply</button>
      </div>
    </div>
  </div>

  <div id="mathModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title">Edit formula</div>
      <div id="mathPreview" class="math-preview"></div>
      <textarea id="mathInput" class="math-input" spellcheck="false" placeholder="LaTeX…"></textarea>
      <div class="modal-actions">
        <button id="mathCancel" class="btn">Cancel</button>
        <button id="mathSave" class="btn btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    const TYPES = {
      page:  { label: "Page",  plural: "Pages",  icon: "fa-solid fa-file" },
      book:  { label: "Book",  plural: "Books",  icon: "fa-solid fa-book" },
      paper: { label: "Paper", plural: "Papers", icon: "fa-solid fa-file-lines" },
      notes: { label: "Note",  plural: "Notes",  icon: "fa-solid fa-note-sticky" },
    };
    const TYPE_ORDER = ["page", "book", "paper", "notes"];
    const HOME_SLUG = "home";   // always-present page, shown on startup
    const DRAFT_KEY = "mathwiki:draft";
    const LIBRARY = "library";       // folder that holds the documents
    const MANIFEST = "index.json";   // tree manifest at the project root

    // GitHub repository to save into. Locally the defaults below are used;
    // if published on <user>.github.io/<repo>/ it is detected automatically.
    const GITHUB = (function () {
      const cfg = { owner: "francescobianco", repo: "math", branch: "main" };
      const host = location.hostname;
      if (host.endsWith("github.io")) {
        cfg.owner = host.split(".")[0];
        const seg = location.pathname.split("/").filter(Boolean)[0];
        if (seg) cfg.repo = seg;
      }
      return cfg;
    })();

    const state = {
      documents: [],
      current: null,            // {slug, title, type, content, created, updated, isDraft}
      mode: "empty",            // empty | view | edit
      dirty: false,
      preview: false,
      inlineEdit: false,
      sidebarView: "tree",      // tree | toc
      modal: null,              // null | "settings" | {name:"formula", fi:N}
    };

    const $ = (sel) => document.querySelector(sel);
    const treeEl = $("#tree");
    const topbarEl = $("#topbar");
    const pageEl = $("#page");
    const toastEl = $("#toast");
    const tocEl = $("#toc");

    const KATEX_OPTS = {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "\\[", right: "\\]", display: true },
        { left: "$", right: "$", display: false },
        { left: "\\(", right: "\\)", display: false },
      ],
      throwOnError: false,
      ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"],
    };

    /* ---------- helpers ---------- */
    function escapeHtml(s) {
      return (s || "").replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (isNaN(d)) return "";
      return d.toLocaleDateString("en-US", { day: "numeric", month: "long", year: "numeric" });
    }

    function slugify(text) {
      return (text || "").trim().toLowerCase()
        .replace(/[^a-z0-9]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") || "untitled";
    }

    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3200);
    }

    function autosize(ta) {
      ta.style.height = "auto";
      ta.style.height = Math.max(ta.scrollHeight, 800) + "px";
    }

    /* ---------- reference codes ---------- */
    const REF_PREFIX = { book: "B", paper: "P", notes: "N" };

    function computeRefCodes(docs) {
      const codeToSlug = {}, slugToCode = {}, counters = {};
      const forced = new Set();
      // First pass: explicit refcode overrides
      docs.forEach((d) => {
        const rc = (d.refcode || "").trim();
        if (rc) {
          const rcUpper = rc.toUpperCase();
          forced.add(rcUpper);
          codeToSlug[rcUpper] = d.slug; // uppercase key for case-insensitive lookup
          slugToCode[d.slug] = rc;      // original case for display
        }
      });
      // Second pass: auto-assign
      docs.forEach((d) => {
        if (slugToCode[d.slug]) return;
        let code;
        if (d.type === "page") {
          // Pages use their slug as the ref code
          code = d.slug;
        } else {
          const p = REF_PREFIX[d.type] || "N";
          counters[p] = (counters[p] || 0);
          do { counters[p]++; code = p + counters[p]; } while (forced.has(code));
        }
        forced.add(code);
        codeToSlug[code] = d.slug; slugToCode[d.slug] = code;
      });
      return { codeToSlug, slugToCode };
    }

    /* ---------- URL hash routing ---------- */
    let _inHistoryRestore = false;

    function stateToHash() {
      if (!state.current || !state.current.slug) return "";
      let h = "doc=" + encodeURIComponent(state.current.slug);
      if (state.sidebarView === "toc") h += "&toc=1";
      if (state.modal === "settings") h += "&modal=settings";
      if (state.modal && typeof state.modal === "object" && state.modal.name === "formula")
        h += "&modal=formula&fi=" + state.modal.fi;
      return h;
    }

    function pushHistory() {
      if (_inHistoryRestore) return;
      const h = stateToHash();
      history.pushState(null, "", h ? "#" + h : "#");
    }

    function replaceHistory() {
      if (_inHistoryRestore) return;
      const h = stateToHash();
      history.replaceState(null, "", h ? "#" + h : "#");
    }

    function parseHash(hash) {
      const h = (hash || "").replace(/^#/, "");
      if (!h) return {};
      const p = {};
      h.split("&").forEach((seg) => {
        const eq = seg.indexOf("=");
        if (eq > -1) p[decodeURIComponent(seg.slice(0, eq))] = decodeURIComponent(seg.slice(eq + 1));
        else if (seg) p[decodeURIComponent(seg)] = true;
      });
      return p;
    }

    async function applyFromParams(params) {
      _inHistoryRestore = true;
      try {
        if (!params.doc) {
          state.current = null; state.mode = "empty"; state.modal = null;
          renderAll(); return;
        }
        await openDocumentNoGuard(params.doc, params.toc === "1");
        if (params.modal === "settings") openSettingsModal();
      } finally {
        _inHistoryRestore = false;
      }
    }

    /* ---------- wiki-ref navigation ---------- */
    function navigateRef(code) {
      const parts = code.split("/");
      const docCode = parts[0].toUpperCase();
      const chapterStr = parts[1]; // e.g. "C2"
      const { codeToSlug } = computeRefCodes(state.documents);
      const slug = codeToSlug[docCode];
      if (!slug) { toast("Reference not found: #" + code); return; }
      const doc = state.documents.find((d) => d.slug === slug);
      const asToc = doc && doc.type !== "page";
      openDocument(slug, asToc).then(() => {
        if (chapterStr) {
          const chNum = parseInt(chapterStr.slice(1));
          if (chNum > 0) requestAnimationFrame(() => {
            const heads = Array.from(pageEl.querySelectorAll(".doc-body h1, .doc-body h2, .doc-body h3"));
            if (heads[chNum - 1]) heads[chNum - 1].scrollIntoView({ behavior: "smooth" });
          });
        }
      });
    }

    function activateWikiRefs(el) {
      el.querySelectorAll("a.wiki-ref").forEach((a) => {
        a.addEventListener("click", (e) => { e.preventDefault(); navigateRef(a.dataset.ref); });
      });
    }

    /* ---------- marked setup (wiki links + external links) ---------- */
    function setupMarked() {
      if (!window.marked) return;
      const renderer = new marked.Renderer();
      const _origLink = renderer.link.bind(renderer);
      renderer.link = function (href, title, text) {
        if (href && /^#(B|P|N|Pg)\d+(?:\/C\d+)?$/i.test(href)) {
          const code = href.slice(1).toUpperCase();
          return `<a href="javascript:void(0)" class="wiki-ref" data-ref="${escapeHtml(code)}" title="${escapeHtml(title || code)}">${text}</a>`;
        }
        const out = _origLink(href, title, text);
        if (href && /^https?:\/\//.test(href)) return out.replace("<a ", '<a target="_blank" rel="noopener" ');
        return out;
      };
      marked.use({ renderer });
    }

    /* ---------- Markdown + math ---------- */
    function renderMarkdown(src) {
      const store = [];
      const mask = (m) => { store.push(m); return "@@MATH" + (store.length - 1) + "@@"; };
      let masked = (src || "")
        .replace(/\$\$[\s\S]+?\$\$/g, mask)
        .replace(/\\\[[\s\S]+?\\\]/g, mask)
        .replace(/\\\([\s\S]+?\\\)/g, mask)
        .replace(/\$(?!\s)(?:\\\$|[^$\n])+?\$/g, mask);
      let html = window.marked ? window.marked.parse(masked) : escapeHtml(masked);
      html = html.replace(/@@MATH(\d+)@@/g, (_, i) => store[+i]);
      return html;
    }

    function typesetMath(el) {
      if (window.renderMathInElement) {
        try { window.renderMathInElement(el, KATEX_OPTS); } catch (e) { /* noop */ }
      }
    }

    function parseDocument(raw) {
      const meta = {};
      let body = raw;
      if (raw.startsWith("---")) {
        const parts = raw.split("---");
        if (parts.length >= 3) {
          parts[1].trim().split("\n").forEach((line) => {
            const i = line.indexOf(":");
            if (i > -1) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
          });
          body = parts.slice(2).join("---").replace(/^\n+/, "");
        }
      }
      return { meta, body };
    }

    /* ---------- data ---------- */
    async function loadManifest() {
      let docs = [];
      try {
        const res = await fetch(MANIFEST, { cache: "no-store" });
        if (res.ok) docs = (await res.json()).documents || [];
      } catch (e) { /* manifest missing or invalid */ }
      state.documents = docs;
      renderTree();
    }

    /* ---------- sidebar tree ---------- */
    function renderTree() {
      treeEl.innerHTML = "";
      const draft = state.current && state.current.isDraft ? state.current : null;
      let total = 0;

      TYPE_ORDER.forEach((type) => {
        const items = state.documents.filter((d) => d.type === type);
        const draftHere = draft && draft.type === type;
        if (!items.length && !draftHere) return;
        total += items.length;

        const group = document.createElement("div");
        group.className = "tree-group";
        const head = document.createElement("div");
        head.className = "tree-group-head";
        head.innerHTML = `<i class="${TYPES[type].icon}"></i><span>${TYPES[type].plural}</span>` +
                         `<span class="count">${items.length}</span>`;
        group.appendChild(head);

        if (type === "page") {
          items.sort((a, b) => (a.slug === HOME_SLUG ? -1 : b.slug === HOME_SLUG ? 1 : 0));
        }
        if (draftHere) group.appendChild(makeDraftItem(draft));
        items.forEach((doc) => group.appendChild(makeItem(doc)));
        treeEl.appendChild(group);
      });

      if (!total && !draft) {
        treeEl.innerHTML = `<div class="tree-empty">No documents yet.<br>Press <b>+ New</b> to start.</div>`;
      }
    }

    function makeItem(doc) {
      const node = document.createElement("div");
      node.className = "tree-item";
      if (state.current && !state.current.isDraft && state.current.slug === doc.slug) node.classList.add("active");
      node.innerHTML = `<span class="label"></span>`;
      node.querySelector(".label").textContent = doc.title;
      node.title = doc.title;
      node.addEventListener("click", () => openDocument(doc.slug, doc.type !== "page"));
      return node;
    }

    function makeDraftItem(draft) {
      const node = document.createElement("div");
      node.className = "tree-item draft active";
      node.innerHTML = `<span class="label"></span>`;
      node.querySelector(".label").textContent = (draft.title || "Untitled") + " (draft)";
      return node;
    }

    /* ---------- topbar ---------- */
    function renderTopbar() {
      if (state.mode === "empty") {
        topbarEl.innerHTML = `<div class="doc-name muted">Select or create a document</div>`;
        return;
      }
      const d = state.current;
      const { slugToCode } = computeRefCodes(state.documents);
      const refCode = d.slug ? (slugToCode[d.slug] || "") : "";
      const refBadge = refCode ? `<span class="refcode-badge" title="Reference code — use #${escapeHtml(refCode)} in wiki links">${escapeHtml(refCode)}</span>` : "";
      const settingsBtn = `<button id="settingsBtn" class="btn" title="Settings"><i class="fa-solid fa-sliders"></i></button>`;
      const exportBtn =
        `<div class="export-wrap">` +
        `<button id="exportBtn" class="btn" title="Export / Share"><i class="fa-solid fa-download"></i></button>` +
        `<div id="exportMenu" class="export-menu hidden">` +
        `<button id="expPrint"><i class="fa-solid fa-print"></i> Print / Save as PDF</button>` +
        `<button id="expMd"><i class="fa-solid fa-file-lines"></i> Download Markdown</button>` +
        `<button id="expLatex"><i class="fa-solid fa-file-invoice"></i> Export as LaTeX (.tex)</button>` +
        `<button id="expHtml"><i class="fa-solid fa-file-code"></i> Export as HTML</button>` +
        `<hr>` +
        `<button id="expLink"><i class="fa-solid fa-link"></i> Copy shareable link</button>` +
        `<button id="expCopy"><i class="fa-regular fa-copy"></i> Copy Markdown source</button>` +
        `<button id="expText"><i class="fa-solid fa-align-left"></i> Copy as plain text</button>` +
        `</div></div>`;
      if (state.mode === "view") {
        if (state.dirty) {
          topbarEl.innerHTML =
            `<div class="doc-name">${refBadge}</div>` +
            `<div class="actions"><span class="badge badge-warn">Unsaved changes</span>` +
            `<button id="discardBtn" class="btn"><i class="fa-solid fa-rotate-left"></i> Discard</button>` +
            settingsBtn +
            `<button id="saveBtn" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>` +
            `</div>`;
          topbarEl.querySelector(".doc-name").prepend(document.createTextNode(d.title));
          $("#discardBtn").onclick = discard;
          $("#settingsBtn").onclick = openSettingsModal;
          $("#saveBtn").onclick = save;
        } else {
          topbarEl.innerHTML =
            `<div class="doc-name">${refBadge}</div>` +
            `<div class="actions">` +
            `<button id="editBtn" class="btn"><i class="fa-solid fa-pen-to-square"></i> Edit</button>` +
            exportBtn + settingsBtn + `</div>`;
          topbarEl.querySelector(".doc-name").prepend(document.createTextNode(d.title));
          $("#editBtn").onclick = enterEdit;
          $("#settingsBtn").onclick = openSettingsModal;
          setupExportMenu(d);
        }
        return;
      }
      // edit
      const badge = d.isDraft
        ? `<span class="badge">Draft • unsaved</span>`
        : (state.dirty ? `<span class="badge badge-warn">Unsaved changes</span>` : "");
      topbarEl.innerHTML =
        `<div class="doc-name">${refBadge}</div>` +
        `<div class="actions">${badge}` +
        `<button id="previewBtn" class="btn">${state.preview ? "<i class=\"fa-solid fa-code\"></i> Markdown" : "<i class=\"fa-solid fa-eye\"></i> Preview"}</button>` +
        `<button id="discardBtn" class="btn"><i class="fa-solid fa-rotate-left"></i> Discard</button>` +
        settingsBtn +
        `<button id="saveBtn" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>` +
        `</div>`;
      topbarEl.querySelector(".doc-name").prepend(document.createTextNode(d.title || "Untitled"));
      $("#previewBtn").onclick = togglePreview;
      $("#discardBtn").onclick = discard;
      $("#settingsBtn").onclick = openSettingsModal;
      $("#saveBtn").onclick = save;
    }

    /* ---------- page rendering ---------- */
    function renderPage() {
      if (state.mode === "empty") {
        pageEl.innerHTML =
          `<div class="empty"><div class="big">M</div>` +
          `<h2>Math Wiki</h2><p>Pick a document on the left<br>or create something new.</p></div>`;
        return;
      }
      if (state.mode === "edit") return renderEditor();

      const d = state.current;

      if (d.type === "book" || d.type === "paper") {
        renderPaginatedPage(d);
        return;
      }

      pageEl.className = "page";
      pageEl.innerHTML =
        `<div class="doc-head">` +
        `<div class="doc-kicker"><i class="${TYPES[d.type].icon}"></i> ${TYPES[d.type].label}</div>` +
        `<h1 class="doc-title"></h1>` +
        `<div class="doc-meta">${formatDate(d.created)}</div>` +
        `</div><div class="doc-body"></div>`;
      pageEl.querySelector(".doc-title").textContent = d.title;
      pageEl.querySelector(".doc-body").innerHTML = renderMarkdown(d.content);
      typesetMath(pageEl);
      applyHeadingNumbers(pageEl, (d.meta || {}).section_prefix);
      numberAndActivateFormulas(pageEl);
      activateWikiRefs(pageEl);
      activateInlineEdit(pageEl);
    }

    function renderEditor() {
      const d = state.current;
      if (state.preview) {
        if (d.type === "book" || d.type === "paper") {
          renderPaginatedPage(d);
          return;
        }
        pageEl.className = "page";
        pageEl.innerHTML =
          `<div class="doc-head">` +
          `<div class="doc-kicker"><i class="${TYPES[d.type].icon}"></i> ${TYPES[d.type].label}</div>` +
          `<h1 class="doc-title"></h1></div><div class="doc-body"></div>`;
        pageEl.querySelector(".doc-title").textContent = d.title || "Untitled";
        pageEl.querySelector(".doc-body").innerHTML = renderMarkdown(d.content);
        typesetMath(pageEl);
        applyHeadingNumbers(pageEl, (d.meta || {}).section_prefix);
        numberAndActivateFormulas(pageEl);
        activateWikiRefs(pageEl);
        if (state.inlineEdit) makeDocBodyEditable(pageEl);
        return;
      }
      pageEl.className = "page";
      pageEl.innerHTML =
        `<input id="titleInput" class="title-input" placeholder="Document title" />` +
        `<textarea id="bodyInput" class="body-input" spellcheck="false" ` +
        `placeholder="Write in Markdown here.\nInline math with $...$ and display math with $$...$$"></textarea>`;
      const ti = $("#titleInput"), bi = $("#bodyInput");
      ti.value = d.title;
      bi.value = d.content;
      ti.addEventListener("input", () => { d.title = ti.value; markDirty(); renderTopbar(); renderTree(); });
      bi.addEventListener("input", () => { d.content = bi.value; autosize(bi); markDirty(); });
      autosize(bi);
      if (!d.title) ti.focus(); else bi.focus();
    }

    /* ---------- formula numbering + modal ---------- */
    function numberAndActivateFormulas(el) {
      const docBody = el.querySelector(".doc-body");
      if (!docBody) return;
      const heads = Array.from(docBody.querySelectorAll("h1, h2, h3"));
      const displayFormulas = Array.from(docBody.querySelectorAll(".katex-display"));
      if (!displayFormulas.length) return;
      const minLevel = heads.length ? Math.min(...heads.map((h) => +h.tagName[1])) : 1;
      let chapterCounter = 0, formulaCounter = 0, globalIdx = 0;
      const all = [...heads, ...displayFormulas].sort((a, b) =>
        a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING ? -1 : 1
      );
      all.forEach((node) => {
        if (node.matches("h1, h2, h3")) {
          const lvl = +node.tagName[1] - minLevel + 1;
          if (lvl === 1) { chapterCounter++; formulaCounter = 0; }
        } else {
          if (chapterCounter === 0) chapterCounter = 1;
          formulaCounter++;
          const label = "(" + chapterCounter + "." + formulaCounter + ")";
          const idx = globalIdx++;
          const row = document.createElement("div");
          row.className = "formula-row";
          node.parentNode.insertBefore(row, node);
          row.appendChild(node);
          const badge = document.createElement("span");
          badge.className = "formula-counter";
          badge.textContent = label;
          row.appendChild(badge);
          row.addEventListener("click", () => openFormulaModal(node, idx, label));
        }
      });
    }

    /* ---------- pagination (book / paper) ---------- */
    function getPageContentHeight() {
      const el = document.createElement("div");
      el.style.cssText = "position:fixed;top:-9999px;left:0;visibility:hidden;width:1px;height:calc(297mm - 74mm);";
      document.body.appendChild(el);
      const h = el.getBoundingClientRect().height;
      el.remove();
      return h;
    }

    function paginateNodes(containerEl, maxH, firstMaxH) {
      const pages = [[]];
      let used = 0;
      let limit = (firstMaxH !== undefined) ? firstMaxH : maxH;
      for (const child of Array.from(containerEl.children)) {
        const s = window.getComputedStyle(child);
        const h = child.getBoundingClientRect().height +
                  (parseFloat(s.marginTop) || 0) + (parseFloat(s.marginBottom) || 0);
        if (used > 0 && used + h > limit) { pages.push([]); used = 0; limit = maxH; }
        pages[pages.length - 1].push(child);
        used += h;
      }
      return pages;
    }

    function buildCoverPage(d) {
      const meta    = d.meta || {};
      const color   = meta.color     || "#2f6df0";
      const author  = meta.author    || meta.authors || "Anonymous";
      const pub     = meta.publisher || "Math Wiki";
      const release = meta.release   || "Release 1";
      const formula = meta.formula   || "e^x";

      let formulaHtml = formula;
      try {
        if (window.katex)
          formulaHtml = window.katex.renderToString(formula, { displayMode: true, throwOnError: false });
      } catch (_) {}

      const cover = document.createElement("div");
      cover.className = "page-cover";
      cover.innerHTML =
        `<div class="cover-release" contenteditable="true">${escapeHtml(release)}</div>` +
        `<div class="cover-body">` +
        `<div class="cover-formula">${formulaHtml}</div>` +
        `<h1 class="cover-title" style="color:${color}">${escapeHtml(d.title)}</h1>` +
        `</div>` +
        `<div class="cover-band" style="background:${color}">` +
        `<div class="cover-author" contenteditable="true">${escapeHtml(author)}</div>` +
        `<div class="cover-publisher">${escapeHtml(pub)}</div>` +
        `</div>`;
      return cover;
    }

    function makeCoverEditable(cover, d) {
      const rel  = cover.querySelector(".cover-release");
      const auth = cover.querySelector(".cover-author");
      if (rel)  rel.addEventListener("input",  () => { (d.meta = d.meta||{}).release = rel.textContent.trim()  || "Release 1"; markDirty(); });
      if (auth) auth.addEventListener("input", () => { (d.meta = d.meta||{}).author  = auth.textContent.trim() || "Anonymous"; markDirty(); });
    }

    function renderPaginatedPage(d) {
      // Phase 1 — render & measure in a hidden off-screen sheet
      const measurer = document.createElement("div");
      measurer.className = "page-sheet";
      measurer.style.cssText = "position:fixed;left:-9999px;top:0;visibility:hidden;";

      let docHeadEl = null;
      if (d.type === "paper") {
        docHeadEl = document.createElement("div");
        docHeadEl.className = "doc-head";
        docHeadEl.innerHTML =
          `<div class="doc-kicker"><i class="${TYPES[d.type].icon}"></i> ${TYPES[d.type].label}</div>` +
          `<h1 class="doc-title"></h1><div class="doc-meta">${formatDate(d.created)}</div>`;
        docHeadEl.querySelector(".doc-title").textContent = d.title;
        measurer.appendChild(docHeadEl);
      }

      const measBody = document.createElement("div");
      measBody.className = "doc-body";
      measBody.innerHTML = renderMarkdown(d.content);
      measurer.appendChild(measBody);
      document.body.appendChild(measurer);
      typesetMath(measurer);

      const fullH  = getPageContentHeight();
      const firstH = docHeadEl
        ? Math.max(60, fullH - docHeadEl.getBoundingClientRect().height - 28)
        : fullH;
      const groups = paginateNodes(measBody, fullH, firstH);
      document.body.removeChild(measurer);

      // Phase 2 — build final DOM
      pageEl.className = "pages-container";
      pageEl.innerHTML = "";
      let pageNum = 1;

      if (d.type === "book") {
        const cover = buildCoverPage(d);
        pageEl.appendChild(cover);
        makeCoverEditable(cover, d);
        pageNum = 2;
      }

      groups.forEach((nodes, gi) => {
        const sheet = document.createElement("div");
        sheet.className = "page-sheet";
        if (d.type === "paper" && gi === 0) {
          const head = document.createElement("div");
          head.className = "doc-head";
          head.innerHTML =
            `<div class="doc-kicker"><i class="${TYPES[d.type].icon}"></i> ${TYPES[d.type].label}</div>` +
            `<h1 class="doc-title"></h1><div class="doc-meta">${formatDate(d.created)}</div>`;
          head.querySelector(".doc-title").textContent = d.title;
          sheet.appendChild(head);
        }
        const body = document.createElement("div");
        body.className = "doc-body";
        nodes.forEach((n) => body.appendChild(n));
        sheet.appendChild(body);
        const footer = document.createElement("div");
        footer.className = "page-num";
        footer.textContent = String(pageNum++);
        sheet.appendChild(footer);
        pageEl.appendChild(sheet);
      });

      applyHeadingNumbers(pageEl, (d.meta || {}).section_prefix);
      numberAndActivateFormulas(pageEl);
      activateWikiRefs(pageEl);
      activateInlineEdit(pageEl);
    }

    let _fState = { idx: -1, origLatex: "" };

    function openFormulaModal(katexEl, idx, label) {
      const ann = katexEl.querySelector('annotation[encoding="application/x-tex"]');
      const latex = ann ? ann.textContent.trim() : "";
      _fState = { idx, origLatex: latex };
      const modal = document.getElementById("mathModal");
      modal.querySelector(".modal-title").textContent = "Formula " + label;
      document.getElementById("mathInput").value = latex;
      _renderFormulaPreview(latex);
      modal.classList.remove("hidden");
      state.modal = { name: "formula", fi: idx };
      pushHistory();
    }

    function _renderFormulaPreview(latex) {
      const preview = document.getElementById("mathPreview");
      if (!latex.trim()) { preview.innerHTML = ""; return; }
      try {
        preview.innerHTML = window.katex
          ? window.katex.renderToString(latex, { displayMode: true, throwOnError: false })
          : latex;
      } catch (e) { preview.textContent = e.message; }
    }

    function _replaceNthDisplayFormula(content, idx, newLatex) {
      const re = /\$\$([\s\S]+?)\$\$|\\\[([\s\S]+?)\\\]/g;
      let count = 0, m;
      while ((m = re.exec(content)) !== null) {
        if (count === idx) {
          const repl = m[0].startsWith("$$") ? "$$" + newLatex + "$$" : "\\[" + newLatex + "\\]";
          return content.slice(0, m.index) + repl + content.slice(m.index + m[0].length);
        }
        count++;
      }
      return null;
    }

    /* ---------- inline WYSIWYG ---------- */
    function applyHeadingNumbers(el, style) {
      if (!style) return;
      const heads = Array.from(el.querySelectorAll(".doc-body h1, .doc-body h2, .doc-body h3"));
      if (!heads.length) return;
      const minLevel = Math.min(...heads.map((h) => +h.tagName[1]));
      const counters = [0, 0, 0];
      heads.forEach((h) => {
        const lvl = +h.tagName[1] - minLevel;
        counters[lvl]++;
        for (let k = lvl + 1; k < counters.length; k++) counters[k] = 0;
        const num = counters.slice(0, lvl + 1).join(".");
        const prefix = style === "dot" ? num + "." : num;
        if (!h.dataset.rawTitle) h.dataset.rawTitle = h.textContent.trim();
        const span = document.createElement("span");
        span.className = "section-num";
        span.textContent = prefix;
        h.prepend(span);
      });
    }

    let _inlineTarget = 0;

    function activateInlineEdit(el) {
      let idx = 0;
      el.querySelectorAll(".doc-body").forEach((db) => db.classList.add("inline-editable"));
      el.querySelectorAll(".doc-body h1, .doc-body h2, .doc-body h3, .doc-body p").forEach((node) => {
        const i = idx++;
        node.addEventListener("click", (e) => {
          if (state.mode !== "view") return;
          e.stopPropagation();
          _inlineTarget = i;
          state.mode = "edit";
          state.preview = true;
          state.inlineEdit = true;
          renderAll();
        });
      });
    }

    function makeDocBodyEditable(el) {
      const nodes = Array.from(
        el.querySelectorAll(".doc-body h1, .doc-body h2, .doc-body h3, .doc-body p")
      );
      nodes.forEach((node, i) => {
        node.contentEditable = "true";
        node.style.outline = "none";
        // Protect inline math and formula blocks from editing
        node.querySelectorAll(".katex").forEach((k) => { k.contentEditable = "false"; });
        // Enter key in headings: blur instead of inserting a line
        if (node.matches("h1, h2, h3")) {
          node.addEventListener("keydown", (e) => {
            if (e.key === "Enter") { e.preventDefault(); node.blur(); }
          });
        }
        node.addEventListener("input", () => markDirty());
        if (i === _inlineTarget) {
          requestAnimationFrame(() => {
            node.focus();
            try {
              const range = document.createRange();
              range.selectNodeContents(node);
              range.collapse(false);
              const sel = window.getSelection();
              sel.removeAllRanges();
              sel.addRange(range);
            } catch (_) {}
          });
        }
      });
    }

    function syncInlineEdits() {
      if (!state.inlineEdit || !state.current) return;
      let md = "";
      pageEl.querySelectorAll(".doc-body").forEach((db) => {
        Array.from(db.children).forEach((child) => { md += _nodeToMd(child); });
      });
      state.current.content = md.trim();
    }

    function _nodeToMd(node) {
      const tag = (node.tagName || "").toLowerCase();
      if (tag === "h1") return "# "  + node.textContent.trim() + "\n\n";
      if (tag === "h2") return "## " + node.textContent.trim() + "\n\n";
      if (tag === "h3") return "### "+ node.textContent.trim() + "\n\n";
      if (tag === "p") {
        // split at <br> elements → each segment becomes its own markdown paragraph
        const segs = [];
        let buf = [];
        for (const child of node.childNodes) {
          if ((child.tagName || "").toLowerCase() === "br") {
            segs.push(buf); buf = [];
          } else {
            buf.push(child);
          }
        }
        segs.push(buf);
        const result = segs
          .map(nodes => {
            const tmp = document.createElement("span");
            nodes.forEach(n => tmp.appendChild(n.cloneNode(true)));
            return _inlineMd(tmp);
          })
          .filter(s => s.trim())
          .map(s => s + "\n\n")
          .join("");
        return result || "\n\n";
      }
      if (node.classList && node.classList.contains("formula-row")) {
        const ann = node.querySelector('annotation[encoding="application/x-tex"]');
        return ann ? "$$" + ann.textContent.trim() + "$$\n\n" : "";
      }
      if (tag === "ul") return Array.from(node.querySelectorAll(":scope > li"))
        .map((li) => "- " + li.textContent.trim()).join("\n") + "\n\n";
      if (tag === "ol") return Array.from(node.querySelectorAll(":scope > li"))
        .map((li, n) => (n + 1) + ". " + li.textContent.trim()).join("\n") + "\n\n";
      if (tag === "blockquote") return Array.from(node.children)
        .map((p) => "> " + p.textContent.trim()).join("\n") + "\n\n";
      if (tag === "hr") return "---\n\n";
      if (tag === "pre") {
        const code = node.querySelector("code");
        return "```\n" + (code ? code.textContent : node.textContent).trim() + "\n```\n\n";
      }
      return "";
    }

    function _inlineMd(el) {
      let md = "";
      for (const child of el.childNodes) {
        if (child.nodeType === Node.TEXT_NODE) { md += child.textContent; continue; }
        const t = (child.tagName || "").toLowerCase();
        if (t === "strong" || t === "b")   { md += "**" + child.textContent + "**"; continue; }
        if (t === "em"     || t === "i")   { md += "*"  + child.textContent + "*";  continue; }
        if (t === "code")                  { md += "`"  + child.textContent + "`";  continue; }
        if (t === "a") {
          const ref = child.getAttribute("data-ref");
          const href = ref ? "#" + ref : (child.getAttribute("href") || "");
          md += "[" + child.textContent + "](" + href + ")"; continue;
        }
        if (child.classList && child.classList.contains("katex")) {
          const ann = child.querySelector('annotation[encoding="application/x-tex"]');
          md += ann ? "$" + ann.textContent.trim() + "$" : child.textContent;
          continue;
        }
        md += _inlineMd(child);
      }
      return md.trim();
    }

    /* ---------- settings modal ---------- */
    function openSettingsModal() {
      if (!state.current) return;
      const d = state.current;
      const meta = d.meta || {};
      document.getElementById("stgTitle").value   = d.title  || "";
      document.getElementById("stgAuthor").value  = meta.author || meta.authors || "";
      document.getElementById("stgSlug").value    = d.slug   || "";
      document.getElementById("stgColor").value   = meta.color || "#2f6df0";
      document.getElementById("stgRefcode").value       = meta.refcode || "";
      document.getElementById("stgSectionPrefix").value = meta.section_prefix || "";
      document.getElementById("settingsModal").classList.remove("hidden");
      state.modal = "settings";
      pushHistory();
    }

    function setupSettingsModal() {
      const modal = document.getElementById("settingsModal");
      const closeSettings = () => {
        modal.classList.add("hidden");
        state.modal = null;
        replaceHistory();
      };
      document.getElementById("stgCancel").onclick = closeSettings;
      document.getElementById("stgApply").onclick = () => {
        const d = state.current;
        if (!d) return;
        d.meta = d.meta || {};
        const newTitle   = document.getElementById("stgTitle").value.trim();
        const newAuthor  = document.getElementById("stgAuthor").value.trim();
        const newSlug    = document.getElementById("stgSlug").value.trim()
          .toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || d.slug;
        const newColor   = document.getElementById("stgColor").value;
        const newRefcode       = document.getElementById("stgRefcode").value.trim();
        const newSectionPrefix = document.getElementById("stgSectionPrefix").value;
        if (newTitle)  { d.title = newTitle; }
        if (newAuthor) { d.meta.author = newAuthor; } else { delete d.meta.author; }
        d.meta.color = newColor;
        if (newSectionPrefix) d.meta.section_prefix = newSectionPrefix;
        else delete d.meta.section_prefix;
        if (newRefcode) {
          d.meta.refcode = newRefcode;
          const inList = state.documents.find((x) => x.slug === d.slug);
          if (inList) inList.refcode = newRefcode;
        } else {
          delete d.meta.refcode;
          const inList = state.documents.find((x) => x.slug === d.slug);
          if (inList) delete inList.refcode;
        }
        if (newSlug && newSlug !== d.slug) { d._oldSlug = d.slug; d.slug = newSlug; }
        closeSettings();
        markDirty();
        renderAll();
      };
      modal.addEventListener("click", (e) => { if (e.target === modal) closeSettings(); });
    }

    function setupFormulaModal() {
      const modal = document.getElementById("mathModal");
      const input = document.getElementById("mathInput");
      const closeFormulaModal = () => {
        modal.classList.add("hidden");
        state.modal = null;
        replaceHistory();
      };
      input.addEventListener("input", () => _renderFormulaPreview(input.value));
      document.getElementById("mathCancel").onclick = closeFormulaModal;
      document.getElementById("mathSave").onclick = () => {
        const newLatex = input.value.trim();
        closeFormulaModal();
        if (newLatex === _fState.origLatex || !state.current) return;
        const newContent = _replaceNthDisplayFormula(state.current.content, _fState.idx, newLatex);
        if (newContent === null) { toast("Formula not found in source."); return; }
        state.current.content = newContent;
        state.mode = "edit";
        state.preview = true;
        markDirty();
        renderAll();
      };
      modal.addEventListener("click", (e) => { if (e.target === modal) closeFormulaModal(); });
    }

    /* ---------- LaTeX export ---------- */
    function latexEscapeText(s) {
      return s
        .replace(/\\/g, "␀BSLASH␀")
        .replace(/\{/g, "\\{").replace(/\}/g, "\\}")
        .replace(/&/g, "\\&").replace(/%/g, "\\%")
        .replace(/\$/g, "\\$").replace(/#/g, "\\#")
        .replace(/\^/g, "\\^{}").replace(/~/g, "\\textasciitilde{}")
        .replace(/␀BSLASH␀/g, "\\textbackslash{}");
    }

    function inlineToLatex(text) {
      // Mask inline math before escaping
      const store = [];
      const mask = (m) => { store.push(m); return "␀M" + (store.length - 1) + "␀"; };
      text = text.replace(/\$(?!\s)(?:\\\$|[^$\n])+?\$/g, mask);
      text = latexEscapeText(text);
      // Markdown inline markup
      text = text
        .replace(/\*\*(.+?)\*\*/g, "\\textbf{$1}")
        .replace(/\*(.+?)\*/g, "\\textit{$1}")
        .replace(/__(.+?)__/g, "\\textbf{$1}")
        .replace(/_([^_]+)_/g, "\\textit{$1}")
        .replace(/`([^`]+)`/g, "\\texttt{$1}")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "\\href{$2}{$1}");
      // Restore math
      return text.replace(/␀M(\d+)␀/g, (_, i) => store[+i]);
    }

    function mdToLatex(d) {
      const meta  = d.meta || {};
      const author = meta.author || meta.authors || "Anonymous";
      const src = d.content || "";

      // Mask all display and inline math before processing
      const store = [];
      const mask = (m) => { store.push(m); return "␀MATH" + (store.length - 1) + "␀"; };
      let text = src
        .replace(/\$\$([\s\S]+?)\$\$/g, mask)
        .replace(/\\\[([\s\S]+?)\\\]/g, mask)
        .replace(/\\\([\s\S]+?\\\)/g, mask)
        .replace(/\$(?!\s)(?:\\\$|[^$\n])+?\$/g, mask);

      const lines = text.split("\n");
      let body = "";
      let listType = null;  // "ul" | "ol"
      let inCode = false, codeLang = "", codeAcc = [];

      const flushList = () => {
        if (listType === "ul") { body += "\\end{itemize}\n\n"; listType = null; }
        else if (listType === "ol") { body += "\\end{enumerate}\n\n"; listType = null; }
      };

      const SECTIONS = ["section", "subsection", "subsubsection", "paragraph", "subparagraph", "subparagraph"];

      for (const line of lines) {
        // Fenced code block
        if (/^```/.test(line)) {
          if (!inCode) { inCode = true; codeLang = line.slice(3).trim(); codeAcc = []; }
          else {
            inCode = false; flushList();
            body += (codeLang ? `\\begin{verbatim}  % ${codeLang}\n` : "\\begin{verbatim}\n") +
                    codeAcc.join("\n") + "\n\\end{verbatim}\n\n";
          }
          continue;
        }
        if (inCode) { codeAcc.push(line); continue; }

        // Horizontal rule
        if (/^---+\s*$/.test(line) && !listType) { body += "\n\\noindent\\rule{\\linewidth}{0.4pt}\n\n"; continue; }

        // Heading
        const hm = line.match(/^(#{1,6})\s+(.*)/);
        if (hm) {
          flushList();
          body += "\\" + SECTIONS[hm[1].length - 1] + "{" + inlineToLatex(hm[2]) + "}\n\n";
          continue;
        }

        // Blockquote
        const bqm = line.match(/^>\s*(.*)/);
        if (bqm) {
          flushList();
          body += "\\begin{quote}\n" + inlineToLatex(bqm[1]) + "\n\\end{quote}\n\n";
          continue;
        }

        // Unordered list
        const ulm = line.match(/^[-*+]\s+(.*)/);
        if (ulm) {
          if (listType !== "ul") { flushList(); body += "\\begin{itemize}\n"; listType = "ul"; }
          body += "\\item " + inlineToLatex(ulm[1]) + "\n";
          continue;
        }

        // Ordered list
        const olm = line.match(/^\d+\.\s+(.*)/);
        if (olm) {
          if (listType !== "ol") { flushList(); body += "\\begin{enumerate}\n"; listType = "ol"; }
          body += "\\item " + inlineToLatex(olm[1]) + "\n";
          continue;
        }

        // Empty line
        if (line.trim() === "") { flushList(); body += "\n"; continue; }

        // Regular line
        body += inlineToLatex(line) + "\n";
      }
      flushList();

      // Restore math: $$ → \[ \], inline $…$ stays as-is
      body = body.replace(/␀MATH(\d+)␀/g, (_, i) => {
        const m = store[+i];
        if (m.startsWith("$$"))   return "\n\\[\n" + m.slice(2, -2).trim() + "\n\\]\n";
        if (m.startsWith("\\[")) return "\n" + m + "\n";
        return m; // inline math
      });

      return [
        "\\documentclass[12pt,a4paper]{article}",
        "\\usepackage[utf8]{inputenc}",
        "\\usepackage[T1]{fontenc}",
        "\\usepackage{amsmath,amssymb,amsthm}",
        "\\usepackage{hyperref}",
        "\\usepackage{geometry}",
        "\\usepackage{parskip}",
        "\\geometry{a4paper, margin=2.5cm}",
        "",
        "\\title{"  + latexEscapeText(d.title || "Untitled") + "}",
        "\\author{" + latexEscapeText(author) + "}",
        "\\date{\\today}",
        "",
        "\\begin{document}",
        "\\maketitle",
        "",
        body.trim(),
        "",
        "\\end{document}",
      ].join("\n");
    }

    /* ---------- export menu ---------- */
    function setupExportMenu(d) {
      const btn  = document.getElementById("exportBtn");
      const menu = document.getElementById("exportMenu");
      if (!btn || !menu) return;

      btn.addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("hidden"); });
      document.addEventListener("click", () => menu.classList.add("hidden"), { once: false });

      document.getElementById("expPrint").onclick = () => {
        menu.classList.add("hidden"); window.print();
      };

      document.getElementById("expMd").onclick = () => {
        menu.classList.add("hidden");
        const src = buildMarkdown(d);
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([src], { type: "text/markdown" }));
        a.download = (d.slug || "document") + ".md";

      };

      document.getElementById("expLatex").onclick = () => {
        menu.classList.add("hidden");
        const tex = mdToLatex(d);
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([tex], { type: "application/x-tex" }));
        a.download = (d.slug || "document") + ".tex";
        a.click(); URL.revokeObjectURL(a.href);
      };

      document.getElementById("expHtml").onclick = () => {
        menu.classList.add("hidden");
        const body = pageEl.querySelector(".doc-body");
        if (!body) { toast("No rendered content to export."); return; }
        const html =
          `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="utf-8">\n` +
          `<title>${escapeHtml(d.title)}</title>\n` +
          `<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">\n` +
          `<style>body{font-family:Georgia,serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.7}</style>\n` +
          `</${"head"}>\n<body>\n<h1>${escapeHtml(d.title)}</${"h1"}>\n${body.innerHTML}\n</${"body"}>\n</${"html"}>`;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([html], { type: "text/html" }));
        a.download = (d.slug || "document") + ".html";
        a.click(); URL.revokeObjectURL(a.href);
      };

      document.getElementById("expLink").onclick = () => {
