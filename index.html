        navigator.clipboard.writeText(window.location.href)
          .then(() => toast("Link copied to clipboard."))
          .catch(() => toast("Could not copy link."));
      };

      document.getElementById("expCopy").onclick = () => {
        menu.classList.add("hidden");
        navigator.clipboard.writeText(d.content || "")
          .then(() => toast("Markdown source copied."))
          .catch(() => toast("Could not copy."));
      };

      document.getElementById("expText").onclick = () => {
        menu.classList.add("hidden");
        const body = pageEl.querySelector(".doc-body");
        const text = body ? body.innerText : (d.content || "");
        navigator.clipboard.writeText(text)
          .then(() => toast("Plain text copied."))
          .catch(() => toast("Could not copy."));
      };
    }

    /* ---------- actions ---------- */
    function markDirty() {
      state.dirty = true;
      if (state.current && state.current.isDraft) saveDraftLocal();
    }

    function confirmLeave() {
      if (!state.dirty) return true;
      return window.confirm("You have unsaved changes. Continue and lose them?");
    }

    function newDocument(type) {
      if (!confirmLeave()) return;
      state.current = { slug: null, title: "", content: "", type, created: null, isDraft: true, meta: {} };
      state.mode = "edit";
      state.preview = false;
      state.dirty = false;
      state.sidebarView = "tree";
      renderAll();
    }

    async function _doLoadDocument(slug, asToc) {
      const res = await fetch(LIBRARY + "/" + slug + ".md", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const { meta, body } = parseDocument(await res.text());
      state.current = {
        slug, title: meta.title || slug,
        type: TYPES[meta.type] ? meta.type : "notes",
        content: body, created: meta.created || "", updated: meta.updated || "",
        isDraft: false, meta,
      };
      // Sync refcode into documents list so computeRefCodes stays accurate
      const inList = state.documents.find((d) => d.slug === slug);
      if (inList) inList.refcode = meta.refcode || inList.refcode || "";
      state.mode = "view"; state.preview = false; state.dirty = false; state.modal = null;
      state.sidebarView = asToc ? "toc" : "tree";
      renderAll();
    }

    async function openDocument(slug, asToc) {
      if (!confirmLeave()) return;
      try {
        await _doLoadDocument(slug, asToc);
        pushHistory();
      } catch (e) {
        toast("Could not open the document.");
      }
    }

    function enterEdit() {
      if (state.inlineEdit) { syncInlineEdits(); state.inlineEdit = false; }
      state.mode = "edit";
      state.preview = false;
      state.dirty = false;
      state.sidebarView = "tree";
      renderAll();
    }

    function togglePreview() {
      if (state.inlineEdit && state.preview) { syncInlineEdits(); state.inlineEdit = false; }
      state.preview = !state.preview;
      renderTopbar();
      renderPage();
    }

    function discard() {
      state.inlineEdit = false;
      if (!confirmLeave()) return;
      clearDraftLocal();
      state.dirty = false;
      state.sidebarView = "tree";
      if (state.current && state.current.slug) {
        openDocumentNoGuard(state.current.slug);
      } else {
        state.current = null;
        state.mode = "empty";
        renderAll();
      }
    }

    async function openDocumentNoGuard(slug, asToc) {
      state.dirty = false;
      try {
        await _doLoadDocument(slug, asToc);
        // No pushHistory — caller manages URL (init, popstate, discard)
      } catch (e) {
        toast("Could not open the document.");
      }
    }

    function isLocalDev() {
      return location.hostname === "localhost" || location.hostname === "127.0.0.1";
    }

    async function save() {
      if (state.inlineEdit) { syncInlineEdits(); state.inlineEdit = false; }
      const d = state.current;
      if (!d.title.trim()) { toast("Give the document a title before saving."); return; }

      if (isLocalDev()) {
        await saveLocal(d);
        return;
      }

      let token = getToken();
      if (!token) { manageToken(); token = getToken(); }
      if (!token) { toast("A GitHub token is required to save."); return; }

      const headers = {
        "Authorization": "Bearer " + token,
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
        "Content-Type": "application/json",
      };
      const api = "https://api.github.com/repos/" + GITHUB.owner + "/" + GITHUB.repo;
      const contentsUrl = (p) => api + "/contents/" + p;
      const ref = "?ref=" + encodeURIComponent(GITHUB.branch);

      toast("Saving to GitHub…");
      try {
        const oldSlug = d._oldSlug || null;
        let slug, path, existed = false;

        if (d.slug) {
          slug = d.slug; path = LIBRARY + "/" + slug + ".md";
          const res = await fetch(contentsUrl(path) + ref, { headers, cache: "no-store" });
          if (res.status === 200) { existed = !oldSlug; }
          else if (res.status !== 404) throw new Error(httpError(res.status));
        } else {
          const baseSlug = slugify(d.title);
          for (let n = 1; ; n++) {
            const cand = n === 1 ? baseSlug : baseSlug + "-" + n;
            const res = await fetch(contentsUrl(LIBRARY + "/" + cand + ".md") + ref, { headers, cache: "no-store" });
            if (res.status === 404) { slug = cand; path = LIBRARY + "/" + cand + ".md"; break; }
            if (res.status !== 200) throw new Error(httpError(res.status));
          }
        }

        if (!d.created) d.created = new Date().toISOString();
        d.updated = new Date().toISOString();
        d.slug = slug;

        // Update in-memory manifest, then serialize it for the commit
        if (oldSlug) state.documents = state.documents.filter((x) => x.slug !== oldSlug);
        const manifestEntry = { slug, title: d.title.trim(), type: d.type, created: d.created, updated: d.updated };
        if (d.meta && d.meta.refcode) manifestEntry.refcode = d.meta.refcode;
        upsertDocument(manifestEntry);
        const sorted = [...state.documents].sort((a, b) => (b.updated || "") > (a.updated || "") ? 1 : -1);
        const indexJson = JSON.stringify({ documents: sorted }, null, 2) + "\n";

        // Get HEAD commit + base tree for atomic multi-file commit
        const headRes = await fetch(api + "/git/refs/heads/" + encodeURIComponent(GITHUB.branch), { headers, cache: "no-store" });
        if (!headRes.ok) throw new Error(httpError(headRes.status));
        const headSha = (await headRes.json()).object.sha;

        const baseCommitRes = await fetch(api + "/git/commits/" + headSha, { headers, cache: "no-store" });
        if (!baseCommitRes.ok) throw new Error(httpError(baseCommitRes.status));
        const baseSha = (await baseCommitRes.json()).tree.sha;

        // Create blobs for both files in parallel
        const mkBlob = (content) => fetch(api + "/git/blobs", {
          method: "POST", headers,
          body: JSON.stringify({ content: toBase64(content), encoding: "base64" }),
        }).then((r) => r.ok ? r.json() : Promise.reject(new Error(httpError(r.status))));

        const [mdBlob, idxBlob] = await Promise.all([mkBlob(buildMarkdown(d)), mkBlob(indexJson)]);

        // Create new tree referencing both blobs (delete old file if renamed)
        const treeEntries = [
          { path, mode: "100644", type: "blob", sha: mdBlob.sha },
          { path: "index.json", mode: "100644", type: "blob", sha: idxBlob.sha },
        ];
        if (oldSlug) treeEntries.push({ path: LIBRARY + "/" + oldSlug + ".md", mode: "100644", type: "blob", sha: null });
        const treeRes = await fetch(api + "/git/trees", {
          method: "POST", headers,
          body: JSON.stringify({ base_tree: baseSha, tree: treeEntries }),
        });
        if (!treeRes.ok) throw new Error(httpError(treeRes.status));
        const newTreeSha = (await treeRes.json()).sha;

        // Create commit
        const commitRes = await fetch(api + "/git/commits", {
          method: "POST", headers,
          body: JSON.stringify({
            message: (existed ? "docs: update " : "docs: create ") + path,
            tree: newTreeSha, parents: [headSha],
          }),
        });
        if (!commitRes.ok) throw new Error(httpError(commitRes.status));
        const newCommitSha = (await commitRes.json()).sha;

        // Advance branch ref
        const refRes = await fetch(api + "/git/refs/heads/" + encodeURIComponent(GITHUB.branch), {
          method: "PATCH", headers, body: JSON.stringify({ sha: newCommitSha }),
        });
        if (!refRes.ok) throw new Error(httpError(refRes.status));

        delete d._oldSlug;
        clearDraftLocal();
        d.isDraft = false;
        state.dirty = false;
        state.mode = "view";
        state.preview = false;
        state.sidebarView = "toc";
        renderAll();
        pushHistory();
        toast((existed ? "Updated " : "Created ") + path + " on GitHub.");
      } catch (e) {
        toast("Save failed: " + e.message);
      }
    }

    async function saveLocal(d) {
      toast("Saving locally…");
      try {
        const oldSlug = d._oldSlug || null;
        let slug, existed = false;

        if (d.slug) {
          slug = d.slug;
          const probe = await fetch(LIBRARY + "/" + slug + ".md", { cache: "no-store" });
          existed = probe.ok && !oldSlug; // renamed: always "new" at the new path
        } else {
          const baseSlug = slugify(d.title);
          for (let n = 1; ; n++) {
            const cand = n === 1 ? baseSlug : baseSlug + "-" + n;
            const probe = await fetch(LIBRARY + "/" + cand + ".md", { cache: "no-store" });
            if (!probe.ok) { slug = cand; break; }
          }
        }

        if (!d.created) d.created = new Date().toISOString();
        d.updated = new Date().toISOString();
        d.slug = slug;

        if (oldSlug) state.documents = state.documents.filter((x) => x.slug !== oldSlug);
        const manifestEntry = { slug, title: d.title.trim(), type: d.type, created: d.created, updated: d.updated };
        if (d.meta && d.meta.refcode) manifestEntry.refcode = d.meta.refcode;
        upsertDocument(manifestEntry);
        const sorted = [...state.documents].sort((a, b) => (b.updated || "") > (a.updated || "") ? 1 : -1);
        const indexJson = JSON.stringify({ documents: sorted }, null, 2) + "\n";

        const put = (path, body) => fetch("/_save/" + path, {
          method: "PUT",
          headers: { "Content-Type": "text/plain; charset=utf-8" },
          body,
        }).then((r) => { if (!r.ok) throw new Error("PUT /" + path + " failed: HTTP " + r.status); });

        const ops = [
          put(LIBRARY + "/" + slug + ".md", buildMarkdown(d)),
          put("index.json", indexJson),
        ];
        if (oldSlug) ops.push(
          fetch("/_delete/" + LIBRARY + "/" + oldSlug + ".md", { method: "DELETE" })
            .then((r) => { if (!r.ok && r.status !== 404) throw new Error("DELETE old file failed: HTTP " + r.status); })
        );
        await Promise.all(ops);
        delete d._oldSlug;

        clearDraftLocal();
        d.isDraft = false;
        state.dirty = false;
        state.mode = "view";
        state.preview = false;
        state.sidebarView = "toc";
        renderAll();
        pushHistory();
        toast((existed ? "Updated" : "Created") + " " + slug + " locally.");
      } catch (e) {
        toast("Save failed: " + e.message);
      }
    }

    function httpError(status) {
      if (status === 401 || status === 403) return "token rejected (needs Contents: write on this repo)";
      if (status === 422) return "invalid request (422)";
      return "HTTP " + status;
    }

    function toBase64(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = "";
      bytes.forEach((b) => { bin += String.fromCharCode(b); });
      return btoa(bin);
    }

    function upsertDocument(doc) {
      const i = state.documents.findIndex((x) => x.slug === doc.slug);
      if (i >= 0) state.documents[i] = doc; else state.documents.push(doc);
    }

    function buildMarkdown(d) {
      const created = d.created || new Date().toISOString();
      const updated = new Date().toISOString();
      const SKIP = new Set(["title", "type", "created", "updated"]);
      const extra = Object.entries(d.meta || {})
        .filter(([k, v]) => !SKIP.has(k) && v !== undefined && v !== "")
        .map(([k, v]) => `${k}: ${v}`).join("\n");
      return `---\ntitle: ${d.title.trim()}\ntype: ${d.type}\n` +
             `created: ${created}\nupdated: ${updated}\n` +
             (extra ? extra + "\n" : "") +
             `---\n\n${(d.content || "").trim()}\n`;
    }

    /* ---------- draft persistence ---------- */
    function saveDraftLocal() {
      const d = state.current;
      if (!d || !d.isDraft) return;
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify({ title: d.title, content: d.content, type: d.type }));
      } catch (e) { /* noop */ }
    }
    function clearDraftLocal() { try { localStorage.removeItem(DRAFT_KEY); } catch (e) {} }
    function loadDraftLocal() {
      try {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return null;
        const d = JSON.parse(raw);
        if (d && (d.title || d.content)) return d;
      } catch (e) {}
      return null;
    }

    /* ---------- GitHub token (kept only in sessionStorage) ---------- */
    const TOKEN_KEY = "mathwiki:token";
    function getToken() {
      try { return sessionStorage.getItem(TOKEN_KEY) || ""; } catch (e) { return ""; }
    }
    function renderTokenStatus() {
      const lbl = $("#tokenLabel");
      if (lbl) lbl.textContent = getToken() ? "GitHub token set ✓" : "Set GitHub token";
    }
    function manageToken() {
      const msg = getToken()
        ? "GitHub token is set for this session. Paste a new token to replace it, or leave empty and press OK to remove it."
        : "Paste a fine-grained Personal Access Token with 'Contents: Read and write' on "
          + GITHUB.owner + "/" + GITHUB.repo + ".\nIt is kept only for this browser session.";
      const val = window.prompt(msg, "");
      if (val === null) return;
      try {
        if (val.trim() === "") { sessionStorage.removeItem(TOKEN_KEY); toast("Token removed."); }
        else { sessionStorage.setItem(TOKEN_KEY, val.trim()); toast("Token saved for this session."); }
      } catch (e) { toast("Could not store the token."); }
      renderTokenStatus();
    }

    /* ---------- orchestration ---------- */
    function renderAll() { renderTopbar(); renderPage(); renderSidebar(); }

    function renderSidebar() {
      const showToc = state.sidebarView === "toc";
      document.getElementById("treeView").classList.toggle("hidden", showToc);
      document.getElementById("tocView").classList.toggle("hidden", !showToc);
      if (showToc) renderToc(); else renderTree();
    }

    function renderToc() {
      tocEl.innerHTML = "";
      const titleEl = document.getElementById("tocDocTitle");
      if (titleEl) {
        titleEl.textContent = state.current ? state.current.title : "";
        titleEl.style.cursor = state.current ? "pointer" : "";
        titleEl.onclick = state.current ? () => {
          const el = document.querySelector(".canvas");
          if (el) el.scrollTo({ top: 0, behavior: "smooth" });
        } : null;
      }
      const canvas = () => document.querySelector(".canvas");

      tocEl.appendChild(makeTocSpecial("(top)", "fa-solid fa-angles-up",
        () => { const el = canvas(); if (el) el.scrollTo({ top: 0, behavior: "smooth" }); }));

      const heads = Array.from(pageEl.querySelectorAll(".doc-body h1, .doc-body h2, .doc-body h3"));
      const minLevel = heads.length ? Math.min.apply(null, heads.map((h) => +h.tagName[1])) : 1;
      const counters = [0, 0, 0];

      heads.forEach((h, i) => {
        if (!h.id) h.id = "h-" + i;
        const lvl = +h.tagName[1] - minLevel + 1;        // normalized: 1..3
        counters[lvl - 1]++;
        for (let k = lvl; k < counters.length; k++) counters[k] = 0;
        const number = counters.slice(0, lvl).join(".");

        const item = document.createElement("a");
        item.className = "toc-item lvl-" + lvl;
        item.href = "#" + h.id;
        const num = document.createElement("span");
        num.className = "toc-num";
        num.textContent = number;
        item.appendChild(num);
        const hText = h.dataset.rawTitle || h.textContent;
        item.appendChild(document.createTextNode(" " + hText));
        item.title = number + " " + hText;
        item.addEventListener("click", (e) => {
          e.preventDefault();
          h.scrollIntoView({ behavior: "smooth", block: "start" });
        });
        tocEl.appendChild(item);
      });

      tocEl.appendChild(makeTocSpecial("(bottom)", "fa-solid fa-angles-down",
        () => { const el = canvas(); if (el) el.scrollTo({ top: el.scrollHeight, behavior: "smooth" }); }));
    }

    function makeTocSpecial(label, iconClass, onClick) {
      const item = document.createElement("a");
      item.className = "toc-item toc-special";
      item.href = "#";
      item.innerHTML = `<i class="${iconClass}"></i> ` + label;
      item.addEventListener("click", (e) => { e.preventDefault(); onClick(); });
      return item;
    }

    function setupMenu() {
      const btn = $("#newBtn"), menu = $("#newMenu");
      btn.addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("hidden"); });
      menu.querySelectorAll("button").forEach((b) => {
        b.addEventListener("click", () => { menu.classList.add("hidden"); newDocument(b.dataset.type); });
      });
      document.addEventListener("click", () => menu.classList.add("hidden"));
      $("#tokenBtn").onclick = manageToken;
      $("#backBtn").onclick = () => { state.sidebarView = "tree"; renderSidebar(); replaceHistory(); };
      $("#brandBtn").onclick = () => {
        if (state.documents.some((d) => d.slug === HOME_SLUG)) openDocument(HOME_SLUG);
      };
    }

    function setupShortcuts() {
      document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "s") {
          if (state.mode === "edit") { e.preventDefault(); save(); }
        }
      });
      window.addEventListener("beforeunload", (e) => {
        if (state.dirty) { e.preventDefault(); e.returnValue = ""; }
      });
    }

    async function init() {
      setupMarked();
      setupMenu();
      setupSettingsModal();
      setupFormulaModal();
      setupShortcuts();
      renderTokenStatus();
      await loadManifest();

      window.addEventListener("popstate", async () => {
        const params = parseHash(window.location.hash);
        await applyFromParams(params);
      });

      const initParams = parseHash(window.location.hash);
      if (initParams.doc) {
        await applyFromParams(initParams);
        return;
      }

      const draft = loadDraftLocal();
      if (draft) {
        state.current = { slug: null, title: draft.title || "", content: draft.content || "",
                          type: TYPES[draft.type] ? draft.type : "notes", created: null, isDraft: true, meta: {} };
        state.mode = "edit";
        state.dirty = !!(draft.title || draft.content);
        renderAll();
        toast("Restored an unsaved draft.");
      } else if (state.documents.some((d) => d.slug === HOME_SLUG)) {
        await openDocument(HOME_SLUG);   // the home page is present by definition
      } else {
        renderAll();
      }
    }

    // KaTeX/marked are loaded with defer: wait for full load.
    if (document.readyState === "complete") init();
    else window.addEventListener("load", init);
  })();
  </script>
</body>
