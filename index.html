<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Wiki</title>

  <!-- KaTeX: math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <!-- Font Awesome Free (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <!-- marked: Markdown parsing -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

  <style>
    :root {
      --bg-chrome: #f3f4f6;
      --bg-canvas: #5b6066;        /* page area: lighter than the chrome */
      --sidebar: #3a3d42;          /* sidebar + topbar: darker gray */
      --sidebar-soft: #4a5057;
      --sidebar-text: #d2d6dc;
      --sidebar-muted: #969ca6;
      --accent: #2f6df0;
      --border: #e3e6eb;
      --page-w: 210mm;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1b1f24;
      background: var(--bg-chrome);
      overflow: hidden;
    }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .workspace { flex: 1; display: flex; min-height: 0; }

    /* ---------- Sidebar ---------- */
    .sidebar {
      width: 348px;
      flex: 0 0 348px;
      background: var(--sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      border-right: 1px solid #00000033;
    }
    .brand {
      flex: 0 0 348px; width: 348px; height: 100%;
      display: flex; align-items: center; gap: 10px;
      padding: 0 18px; box-sizing: border-box;
      border-right: 1px solid #00000033;
      color: var(--sidebar-text);
      font-weight: 700; font-size: 17px; letter-spacing: .2px;
    }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 19px;
    }
    .new-doc { position: relative; padding: 14px 14px 8px; }
    #newBtn { font-size: 15px; padding: 9px 14px; }
    .menu {
      position: absolute; top: 56px; left: 14px; right: 14px; z-index: 20;
      background: #fff; color: #1b1f24; border-radius: 10px;
      box-shadow: 0 12px 30px #00000040; overflow: hidden; padding: 6px;
    }
    .menu button {
      display: flex; width: 100%; gap: 10px; align-items: center;
      padding: 9px 10px; border: 0; background: transparent;
      font-size: 14px; border-radius: 7px; cursor: pointer; text-align: left;
    }
    .menu button:hover { background: #eef1f6; }
    .hidden { display: none !important; }

    .tree { flex: 1; overflow-y: auto; padding: 6px 8px 24px; }
    .tree-group { margin-bottom: 6px; }
    .tree-group-head {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px 6px; font-size: 12.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px; color: var(--sidebar-muted);
    }
    .tree-group-head .count {
      margin-left: auto; font-weight: 600; opacity: .7;
    }
    .tree-item {
      display: flex; align-items: center;
      padding: 7px 10px 7px 34px; margin: 1px 2px; border-radius: 8px;
      font-size: 15px; cursor: pointer; color: var(--sidebar-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tree-item:hover { background: var(--sidebar-soft); }
    .tree-item.active { background: var(--accent); color: #fff; }
    .tree-item .label { overflow: hidden; text-overflow: ellipsis; }
    .tree-item.draft { font-style: italic; color: #ffd479; }
    .tree-empty { padding: 14px 12px; font-size: 13px; color: var(--sidebar-muted); }
    .side-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .toc-head {
      padding: 14px 16px 8px; font-size: 12.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px; color: var(--sidebar-muted);
    }
    .toc { flex: 1; overflow-y: auto; padding: 2px 8px 16px; }
    .toc-item {
      display: block; padding: 6px 10px; margin: 1px 2px; border-radius: 7px;
      font-size: 14.5px; line-height: 1.4; color: var(--sidebar-text);
      text-decoration: none; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .toc-item:hover { background: var(--sidebar-soft); }
    .toc-item.lvl-h1 { font-weight: 700; }
    .toc-item.lvl-h2 { padding-left: 26px; }
    .toc-item.lvl-h3 { padding-left: 40px; opacity: .82; }
    .toc-item.toc-special { color: var(--sidebar-muted); font-style: italic; }
    .toc-item.toc-special i { width: 18px; text-align: center; }
    .tree-group-head i, .menu button i, .token-btn i { width: 18px; text-align: center; font-size: 15px; }
    .sidebar-foot { padding: 10px 12px; border-top: 1px solid #00000033; }
    .toc-back { padding: 10px 12px; border-bottom: 1px solid #00000033; }
    .token-btn {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border: 0; border-radius: 8px; cursor: pointer;
      background: transparent; color: var(--sidebar-muted);
      font-size: 13.5px; text-align: left;
    }
    .token-btn:hover { background: var(--sidebar-soft); color: var(--sidebar-text); }

    /* ---------- Topbar (full width) ---------- */
    .topbar {
      flex: 0 0 auto; height: 56px;
      display: flex; align-items: center;
      background: var(--sidebar); color: var(--sidebar-text);
      border-bottom: 1px solid #00000026;
    }
    .topbar-content {
      flex: 1; min-width: 0; position: relative;
      display: flex; align-items: center;
      padding: 0 18px;
    }

    /* ---------- Main ---------- */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .doc-name {
      position: absolute; left: 50%; transform: translateX(-50%);
      max-width: 60%; text-align: center; pointer-events: none;
      font-family: "Times New Roman", Georgia, serif;
      font-size: 19px; font-weight: 600; color: var(--sidebar-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-name.muted { font-family: inherit; font-size: 14.5px; font-style: italic; color: var(--sidebar-muted); }
    .actions { margin-left: auto; display: flex; align-items: center; gap: 8px; flex: 0 0 auto; z-index: 1; }
    .btn {
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .08); font-size: 13.5px; font-weight: 600;
      cursor: pointer; color: var(--sidebar-text);
    }
    .btn:hover { background: rgba(255, 255, 255, .16); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #245fd6; }
    .badge {
      font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
      background: #fff4d6; color: #8a6300; border: 1px solid #f0d999;
      text-transform: none; letter-spacing: 0;
    }
    .badge-warn { background: #ffe8e8; color: #a3261f; border-color: #f3c0bc; }

    /* ---------- Canvas / A4 sheet ---------- */
    .canvas {
      flex: 1; overflow: auto; background: var(--bg-canvas);
      padding: 32px 24px 64px; display: flex; justify-content: center;
    }
    .page {
      width: 100%;
      max-width: 1200px;
      min-height: 297mm;
      background: #fff;
      box-shadow: 0 4px 24px #00000059;
      padding: 26mm 30mm;
      align-self: flex-start;
      border-radius: 2px;
    }

    /* "sheet" typography */
    .doc-head { text-align: center; margin-bottom: 26px; }
    .doc-kicker {
      font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #8a909a; font-weight: 600; margin-bottom: 8px;
    }
    .doc-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px; line-height: 1.2; margin: 0; color: #14181d;
    }
    .doc-meta { font-size: 12.5px; color: #9aa0a8; margin-top: 10px; }

    .doc-body {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px; line-height: 1.7; color: #1d2127;
    }
    .doc-body h1, .doc-body h2, .doc-body h3 {
      font-family: Georgia, "Times New Roman", serif; line-height: 1.3;
      margin: 1.6em 0 .5em; color: #14181d;
    }
    .doc-body h1 { font-size: 25px; border-bottom: 1px solid #ebedf0; padding-bottom: .25em; }
    .doc-body h2 { font-size: 21px; }
    .doc-body h3 { font-size: 18px; }
    .doc-body p { margin: 0 0 1em; }
    .doc-body ul, .doc-body ol { margin: 0 0 1em; padding-left: 1.5em; }
    .doc-body li { margin: .25em 0; }
    .doc-body blockquote {
      margin: 1em 0; padding: .4em 1.1em; border-left: 3px solid #d6dae0;
      color: #565d66; font-style: italic;
    }
    .doc-body code {
      font-family: "SFMono-Regular", Consolas, monospace; font-size: .88em;
      background: #f1f3f5; padding: .12em .4em; border-radius: 4px;
    }
    .doc-body pre {
      background: #f6f8fa; padding: 14px 16px; border-radius: 8px;
      overflow-x: auto; border: 1px solid #ebedf0;
    }
    .doc-body pre code { background: none; padding: 0; }
    .doc-body table { border-collapse: collapse; margin: 1em 0; width: 100%; }
    .doc-body th, .doc-body td { border: 1px solid #dfe2e6; padding: 6px 11px; text-align: left; }
    .doc-body th { background: #f6f8fa; }
    .doc-body hr { border: 0; border-top: 1px solid #e7e9ec; margin: 1.8em 0; }
    .katex-display { margin: 1.1em 0; overflow-x: auto; overflow-y: hidden; }

    /* ---------- Editor ---------- */
    .title-input {
      width: 100%; border: 0; outline: none;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px; font-weight: 700; color: #14181d;
      margin-bottom: 18px; padding: 0;
    }
    .title-input::placeholder { color: #c2c7ce; }
    .body-input {
      width: 100%; border: 0; outline: none; resize: none;
      font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
      font-size: 14px; line-height: 1.7; color: #1d2127;
      min-height: 220mm; overflow: hidden;
    }
    .body-input::placeholder { color: #c2c7ce; }

    /* ---------- Empty state ---------- */
    .empty {
      text-align: center; color: #aab0b8;
      font-family: Georgia, serif; padding-top: 60px;
    }
    .empty .big { font-size: 54px; margin-bottom: 10px; }
    .empty h2 { color: #767c85; font-weight: 600; margin: 0 0 6px; }

    /* ---------- Toast ---------- */
    #toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1f2430; color: #fff; padding: 11px 18px; border-radius: 10px;
      font-size: 13.5px; box-shadow: 0 8px 24px #0006; opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none; z-index: 50;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media print {
      .sidebar, .topbar, #toast { display: none !important; }
      .canvas { overflow: visible; background: #fff; padding: 0; }
      .page { box-shadow: none; width: auto; padding: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">∑</span>
        <span class="brand-name">Math Wiki</span>
      </div>
      <div id="topbar" class="topbar-content"></div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div id="treeView" class="side-view">
          <div class="new-doc">
            <button id="newBtn" class="btn btn-primary" style="width:100%">+ New</button>
            <div id="newMenu" class="menu hidden">
              <button data-type="page"><i class="fa-solid fa-file"></i> Page</button>
              <button data-type="paper"><i class="fa-solid fa-file-lines"></i> Paper</button>
              <button data-type="book"><i class="fa-solid fa-book"></i> Book</button>
              <button data-type="notes"><i class="fa-solid fa-note-sticky"></i> Notes</button>
            </div>
          </div>
          <nav id="tree" class="tree"></nav>
          <div class="sidebar-foot">
            <button id="tokenBtn" class="token-btn"><i class="fa-solid fa-key"></i> <span id="tokenLabel">Set GitHub token</span></button>
          </div>
        </div>

        <div id="tocView" class="side-view hidden">
          <div class="toc-back">
            <button id="backBtn" class="token-btn"><i class="fa-solid fa-arrow-left"></i> Back to documents</button>
          </div>
          <div class="toc-head">On this page</div>
          <nav id="toc" class="toc"></nav>
        </div>
      </aside>

      <main class="main">
        <div class="canvas">
          <article id="page" class="page"></article>
        </div>
      </main>
    </div>
  </div>
  <div id="toast"></div>

  <script>
  (function () {
    "use strict";

    const TYPES = {
      page:  { label: "Page",  plural: "Pages",  icon: "fa-solid fa-file" },
      book:  { label: "Book",  plural: "Books",  icon: "fa-solid fa-book" },
      paper: { label: "Paper", plural: "Papers", icon: "fa-solid fa-file-lines" },
      notes: { label: "Note",  plural: "Notes",  icon: "fa-solid fa-note-sticky" },
    };
    const TYPE_ORDER = ["page", "book", "paper", "notes"];
    const HOME_SLUG = "home";   // always-present page, shown on startup
    const DRAFT_KEY = "mathwiki:draft";
    const LIBRARY = "library";       // folder that holds the documents
    const MANIFEST = "index.json";   // tree manifest at the project root

    // GitHub repository to save into. Locally the defaults below are used;
    // if published on <user>.github.io/<repo>/ it is detected automatically.
    const GITHUB = (function () {
      const cfg = { owner: "francescobianco", repo: "math", branch: "main" };
      const host = location.hostname;
      if (host.endsWith("github.io")) {
        cfg.owner = host.split(".")[0];
        const seg = location.pathname.split("/").filter(Boolean)[0];
        if (seg) cfg.repo = seg;
      }
      return cfg;
    })();

    const state = {
      documents: [],
      current: null,            // {slug, title, type, content, created, updated, isDraft}
      mode: "empty",            // empty | view | edit
      dirty: false,
      preview: false,
      sidebarView: "tree",      // tree | toc
    };

    const $ = (sel) => document.querySelector(sel);
    const treeEl = $("#tree");
    const topbarEl = $("#topbar");
    const pageEl = $("#page");
    const toastEl = $("#toast");
    const tocEl = $("#toc");

    const KATEX_OPTS = {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "\\[", right: "\\]", display: true },
        { left: "$", right: "$", display: false },
        { left: "\\(", right: "\\)", display: false },
      ],
      throwOnError: false,
      ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"],
    };

    /* ---------- helpers ---------- */
    function escapeHtml(s) {
      return (s || "").replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (isNaN(d)) return "";
      return d.toLocaleDateString("en-US", { day: "numeric", month: "long", year: "numeric" });
    }

    function slugify(text) {
      return (text || "").trim().toLowerCase()
        .replace(/[^a-z0-9]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") || "untitled";
    }

    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3200);
    }

    function autosize(ta) {
      ta.style.height = "auto";
      ta.style.height = Math.max(ta.scrollHeight, 800) + "px";
    }

    /* ---------- Markdown + math ---------- */
    function renderMarkdown(src) {
      const store = [];
      const mask = (m) => { store.push(m); return "@@MATH" + (store.length - 1) + "@@"; };
      let masked = (src || "")
        .replace(/\$\$[\s\S]+?\$\$/g, mask)
        .replace(/\\\[[\s\S]+?\\\]/g, mask)
        .replace(/\\\([\s\S]+?\\\)/g, mask)
        .replace(/\$(?!\s)(?:\\\$|[^$\n])+?\$/g, mask);
      let html = window.marked ? window.marked.parse(masked) : escapeHtml(masked);
      html = html.replace(/@@MATH(\d+)@@/g, (_, i) => store[+i]);
      return html;
    }

    function typesetMath(el) {
      if (window.renderMathInElement) {
        try { window.renderMathInElement(el, KATEX_OPTS); } catch (e) { /* noop */ }
      }
    }

    function parseDocument(raw) {
      const meta = {};
      let body = raw;
      if (raw.startsWith("---")) {
        const parts = raw.split("---");
        if (parts.length >= 3) {
          parts[1].trim().split("\n").forEach((line) => {
            const i = line.indexOf(":");
            if (i > -1) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
          });
          body = parts.slice(2).join("---").replace(/^\n+/, "");
        }
      }
      return { meta, body };
    }

    /* ---------- data ---------- */
    async function loadManifest() {
      let docs = [];
      try {
        const res = await fetch(MANIFEST, { cache: "no-store" });
        if (res.ok) docs = (await res.json()).documents || [];
      } catch (e) { /* manifest missing or invalid */ }
      state.documents = docs;
      renderTree();
    }

    /* ---------- sidebar tree ---------- */
    function renderTree() {
      treeEl.innerHTML = "";
      const draft = state.current && state.current.isDraft ? state.current : null;
      let total = 0;

      TYPE_ORDER.forEach((type) => {
        const items = state.documents.filter((d) => d.type === type);
        const draftHere = draft && draft.type === type;
        if (!items.length && !draftHere) return;
        total += items.length;

        const group = document.createElement("div");
        group.className = "tree-group";
        const head = document.createElement("div");
        head.className = "tree-group-head";
        head.innerHTML = `<i class="${TYPES[type].icon}"></i><span>${TYPES[type].plural}</span>` +
                         `<span class="count">${items.length}</span>`;
        group.appendChild(head);

        if (type === "page") {
          items.sort((a, b) => (a.slug === HOME_SLUG ? -1 : b.slug === HOME_SLUG ? 1 : 0));
        }
        if (draftHere) group.appendChild(makeDraftItem(draft));
        items.forEach((doc) => group.appendChild(makeItem(doc)));
        treeEl.appendChild(group);
      });

      if (!total && !draft) {
        treeEl.innerHTML = `<div class="tree-empty">No documents yet.<br>Press <b>+ New</b> to start.</div>`;
      }
    }

    function makeItem(doc) {
      const node = document.createElement("div");
      node.className = "tree-item";
      if (state.current && !state.current.isDraft && state.current.slug === doc.slug) node.classList.add("active");
      node.innerHTML = `<span class="label"></span>`;
      node.querySelector(".label").textContent = doc.title;
      node.title = doc.title;
      node.addEventListener("click", () => openDocument(doc.slug, true));
      return node;
    }

    function makeDraftItem(draft) {
      const node = document.createElement("div");
      node.className = "tree-item draft active";
      node.innerHTML = `<span class="label"></span>`;
      node.querySelector(".label").textContent = (draft.title || "Untitled") + " (draft)";
      return node;
    }

    /* ---------- topbar ---------- */
    function renderTopbar() {
      if (state.mode === "empty") {
        topbarEl.innerHTML = `<div class="doc-name muted">Select or create a document</div>`;
        return;
      }
      const d = state.current;
      if (state.mode === "view") {
        topbarEl.innerHTML =
          `<div class="doc-name"></div>` +
          `<div class="actions"><button id="editBtn" class="btn">Edit</button></div>`;
        topbarEl.querySelector(".doc-name").textContent = d.title;
        $("#editBtn").onclick = enterEdit;
        return;
      }
      // edit
      const badge = d.isDraft
        ? `<span class="badge">Draft • unsaved</span>`
        : (state.dirty ? `<span class="badge badge-warn">Unsaved changes</span>` : "");
      topbarEl.innerHTML =
        `<div class="doc-name"></div>` +
        `<div class="actions">${badge}` +
        `<button id="previewBtn" class="btn">${state.preview ? "Edit" : "Preview"}</button>` +
        `<button id="discardBtn" class="btn">Discard</button>` +
        `<button id="saveBtn" class="btn btn-primary">Save</button>` +
        `</div>`;
      topbarEl.querySelector(".doc-name").textContent = d.title || "Untitled";
      $("#previewBtn").onclick = togglePreview;
      $("#discardBtn").onclick = discard;
      $("#saveBtn").onclick = save;
    }

    /* ---------- page rendering ---------- */
    function renderPage() {
      if (state.mode === "empty") {
        pageEl.innerHTML =
          `<div class="empty"><div class="big">∑</div>` +
          `<h2>Math Wiki</h2><p>Pick a document on the left<br>or create something new.</p></div>`;
        return;
      }
      if (state.mode === "edit") return renderEditor();

      const d = state.current;
      pageEl.innerHTML =
        `<div class="doc-head">` +
        `<div class="doc-kicker"><i class="${TYPES[d.type].icon}"></i> ${TYPES[d.type].label}</div>` +
        `<h1 class="doc-title"></h1>` +
        `<div class="doc-meta">${formatDate(d.created)}</div>` +
        `</div><div class="doc-body"></div>`;
      pageEl.querySelector(".doc-title").textContent = d.title;
      pageEl.querySelector(".doc-body").innerHTML = renderMarkdown(d.content);
      typesetMath(pageEl);
    }

    function renderEditor() {
      const d = state.current;
      if (state.preview) {
        pageEl.innerHTML =
          `<div class="doc-head">` +
          `<div class="doc-kicker"><i class="${TYPES[d.type].icon}"></i> ${TYPES[d.type].label}</div>` +
          `<h1 class="doc-title"></h1></div><div class="doc-body"></div>`;
        pageEl.querySelector(".doc-title").textContent = d.title || "Untitled";
        pageEl.querySelector(".doc-body").innerHTML = renderMarkdown(d.content);
        typesetMath(pageEl);
        return;
      }
      pageEl.innerHTML =
        `<input id="titleInput" class="title-input" placeholder="Document title" />` +
        `<textarea id="bodyInput" class="body-input" spellcheck="false" ` +
        `placeholder="Write in Markdown here.\nInline math with $...$ and display math with $$...$$"></textarea>`;
      const ti = $("#titleInput"), bi = $("#bodyInput");
      ti.value = d.title;
      bi.value = d.content;
      ti.addEventListener("input", () => { d.title = ti.value; markDirty(); renderTopbar(); renderTree(); });
      bi.addEventListener("input", () => { d.content = bi.value; autosize(bi); markDirty(); });
      autosize(bi);
      if (!d.title) ti.focus(); else bi.focus();
    }

    /* ---------- actions ---------- */
    function markDirty() {
      state.dirty = true;
      if (state.current && state.current.isDraft) saveDraftLocal();
    }

    function confirmLeave() {
      if (!state.dirty) return true;
      return window.confirm("You have unsaved changes. Continue and lose them?");
    }

    function newDocument(type) {
      if (!confirmLeave()) return;
      state.current = { slug: null, title: "", content: "", type, created: null, isDraft: true };
      state.mode = "edit";
      state.preview = false;
      state.dirty = false;
      state.sidebarView = "tree";
      renderAll();
    }

    async function openDocument(slug, asToc) {
      if (state.current && state.current.isDraft && state.current.slug === null && state.dirty) {
        if (!confirmLeave()) return;
      } else if (!confirmLeave()) return;
      try {
        const res = await fetch(LIBRARY + "/" + slug + ".md", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const { meta, body } = parseDocument(await res.text());
        state.current = {
          slug,
          title: meta.title || slug,
          type: TYPES[meta.type] ? meta.type : "notes",
          content: body,
          created: meta.created || "",
          updated: meta.updated || "",
          isDraft: false,
        };
        state.mode = "view";
        state.preview = false;
        state.dirty = false;
        if (asToc) state.sidebarView = "toc";
        renderAll();
      } catch (e) {
        toast("Could not open the document.");
      }
    }

    function enterEdit() {
      state.mode = "edit";
      state.preview = false;
      state.dirty = false;
      state.sidebarView = "tree";
      renderAll();
    }

    function togglePreview() {
      state.preview = !state.preview;
      renderTopbar();
      renderPage();
    }

    function discard() {
      if (!confirmLeave()) return;
      clearDraftLocal();
      state.dirty = false;
      state.sidebarView = "tree";
      if (state.current && state.current.slug) {
        openDocumentNoGuard(state.current.slug);
      } else {
        state.current = null;
        state.mode = "empty";
        renderAll();
      }
    }

    async function openDocumentNoGuard(slug, asToc) {
      state.dirty = false;
      await openDocument(slug, asToc);
    }

    async function save() {
      const d = state.current;
      if (!d.title.trim()) { toast("Give the document a title before saving."); return; }

      let token = getToken();
      if (!token) { manageToken(); token = getToken(); }
      if (!token) { toast("A GitHub token is required to save."); return; }

      const headers = {
        "Authorization": "Bearer " + token,
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
      };
      const contentsUrl = (p) =>
        "https://api.github.com/repos/" + GITHUB.owner + "/" + GITHUB.repo + "/contents/" + p;
      const ref = "?ref=" + encodeURIComponent(GITHUB.branch);

      toast("Saving to GitHub…");
      try {
        let slug, path, sha = null, existed = false;

        if (d.slug) {
          // Updating an existing document: fetch its current sha.
          slug = d.slug;
          path = LIBRARY + "/" + slug + ".md";
          const res = await fetch(contentsUrl(path) + ref, { headers, cache: "no-store" });
          if (res.status === 200) { sha = (await res.json()).sha; existed = true; }
          else if (res.status !== 404) throw new Error(httpError(res.status));
        } else {
          // New document: pick the first free slug so we never clobber a file.
          const baseSlug = slugify(d.title);
          for (let n = 1; ; n++) {
            const cand = n === 1 ? baseSlug : baseSlug + "-" + n;
            const res = await fetch(contentsUrl(LIBRARY + "/" + cand + ".md") + ref, { headers, cache: "no-store" });
            if (res.status === 404) { slug = cand; path = LIBRARY + "/" + cand + ".md"; break; }
            if (res.status !== 200) throw new Error(httpError(res.status));
          }
        }

        if (!d.created) d.created = new Date().toISOString();
        const body = {
          message: (existed ? "Update " : "Create ") + path,
          content: toBase64(buildMarkdown(d)),
          branch: GITHUB.branch,
        };
        if (sha) body.sha = sha;

        const put = await fetch(contentsUrl(path), { method: "PUT", headers, body: JSON.stringify(body) });
        if (!put.ok) throw new Error(httpError(put.status));

        // Optimistic local update (the Action rebuilds the manifest on push).
        clearDraftLocal();
        d.slug = slug;
        d.isDraft = false;
        d.updated = new Date().toISOString();
        state.dirty = false;
        upsertDocument({ slug, title: d.title.trim(), type: d.type, created: d.created, updated: d.updated });
        state.mode = "view";
        state.preview = false;
        state.sidebarView = "toc";
        renderAll();
        toast((existed ? "Updated " : "Created ") + path + " on GitHub.");
      } catch (e) {
        toast("Save failed: " + e.message);
      }
    }

    function httpError(status) {
      if (status === 401 || status === 403) return "token rejected (needs Contents: write on this repo)";
      if (status === 422) return "invalid request (422)";
      return "HTTP " + status;
    }

    function toBase64(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = "";
      bytes.forEach((b) => { bin += String.fromCharCode(b); });
      return btoa(bin);
    }

    function upsertDocument(doc) {
      const i = state.documents.findIndex((x) => x.slug === doc.slug);
      if (i >= 0) state.documents[i] = doc; else state.documents.push(doc);
    }

    function buildMarkdown(d) {
      const created = d.created || new Date().toISOString();
      const updated = new Date().toISOString();
      return `---\ntitle: ${d.title.trim()}\ntype: ${d.type}\n` +
             `created: ${created}\nupdated: ${updated}\n---\n\n${(d.content || "").trim()}\n`;
    }

    /* ---------- draft persistence ---------- */
    function saveDraftLocal() {
      const d = state.current;
      if (!d || !d.isDraft) return;
      try {
        localStorage.setItem(DRAFT_KEY, JSON.stringify({ title: d.title, content: d.content, type: d.type }));
      } catch (e) { /* noop */ }
    }
    function clearDraftLocal() { try { localStorage.removeItem(DRAFT_KEY); } catch (e) {} }
    function loadDraftLocal() {
      try {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return null;
        const d = JSON.parse(raw);
        if (d && (d.title || d.content)) return d;
      } catch (e) {}
      return null;
    }

    /* ---------- GitHub token (kept only in sessionStorage) ---------- */
    const TOKEN_KEY = "mathwiki:token";
    function getToken() {
      try { return sessionStorage.getItem(TOKEN_KEY) || ""; } catch (e) { return ""; }
    }
    function renderTokenStatus() {
      const lbl = $("#tokenLabel");
      if (lbl) lbl.textContent = getToken() ? "GitHub token set ✓" : "Set GitHub token";
    }
    function manageToken() {
      const msg = getToken()
        ? "GitHub token is set for this session. Paste a new token to replace it, or leave empty and press OK to remove it."
        : "Paste a fine-grained Personal Access Token with 'Contents: Read and write' on "
          + GITHUB.owner + "/" + GITHUB.repo + ".\nIt is kept only for this browser session.";
      const val = window.prompt(msg, "");
      if (val === null) return;
      try {
        if (val.trim() === "") { sessionStorage.removeItem(TOKEN_KEY); toast("Token removed."); }
        else { sessionStorage.setItem(TOKEN_KEY, val.trim()); toast("Token saved for this session."); }
      } catch (e) { toast("Could not store the token."); }
      renderTokenStatus();
    }

    /* ---------- orchestration ---------- */
    function renderAll() { renderTopbar(); renderPage(); renderSidebar(); }

    function renderSidebar() {
      const showToc = state.sidebarView === "toc";
      document.getElementById("treeView").classList.toggle("hidden", showToc);
      document.getElementById("tocView").classList.toggle("hidden", !showToc);
      if (showToc) renderToc(); else renderTree();
    }

    function renderToc() {
      tocEl.innerHTML = "";
      const canvas = () => document.querySelector(".canvas");

      tocEl.appendChild(makeTocSpecial("(top)", "fa-solid fa-angles-up",
        () => { const el = canvas(); if (el) el.scrollTo({ top: 0, behavior: "smooth" }); }));

      pageEl.querySelectorAll(".doc-body h1, .doc-body h2, .doc-body h3").forEach((h, i) => {
        if (!h.id) h.id = "h-" + i;
        const item = document.createElement("a");
        item.className = "toc-item lvl-" + h.tagName.toLowerCase();
        item.textContent = h.textContent;
        item.href = "#" + h.id;
        item.addEventListener("click", (e) => {
          e.preventDefault();
          h.scrollIntoView({ behavior: "smooth", block: "start" });
        });
        tocEl.appendChild(item);
      });

      tocEl.appendChild(makeTocSpecial("(bottom)", "fa-solid fa-angles-down",
        () => { const el = canvas(); if (el) el.scrollTo({ top: el.scrollHeight, behavior: "smooth" }); }));
    }

    function makeTocSpecial(label, iconClass, onClick) {
      const item = document.createElement("a");
      item.className = "toc-item toc-special";
      item.href = "#";
      item.innerHTML = `<i class="${iconClass}"></i> ` + label;
      item.addEventListener("click", (e) => { e.preventDefault(); onClick(); });
      return item;
    }

    function setupMenu() {
      const btn = $("#newBtn"), menu = $("#newMenu");
      btn.addEventListener("click", (e) => { e.stopPropagation(); menu.classList.toggle("hidden"); });
      menu.querySelectorAll("button").forEach((b) => {
        b.addEventListener("click", () => { menu.classList.add("hidden"); newDocument(b.dataset.type); });
      });
      document.addEventListener("click", () => menu.classList.add("hidden"));
      $("#tokenBtn").onclick = manageToken;
      $("#backBtn").onclick = () => { state.sidebarView = "tree"; renderSidebar(); };
    }

    function setupShortcuts() {
      document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "s") {
          if (state.mode === "edit") { e.preventDefault(); save(); }
        }
      });
      window.addEventListener("beforeunload", (e) => {
        if (state.dirty) { e.preventDefault(); e.returnValue = ""; }
      });
    }

    async function init() {
      setupMenu();
      setupShortcuts();
      renderTokenStatus();
      await loadManifest();
      const draft = loadDraftLocal();
      if (draft) {
        state.current = { slug: null, title: draft.title || "", content: draft.content || "",
                          type: TYPES[draft.type] ? draft.type : "notes", created: null, isDraft: true };
        state.mode = "edit";
        state.dirty = !!(draft.title || draft.content);
        renderAll();
        toast("Restored an unsaved draft.");
      } else if (state.documents.some((d) => d.slug === HOME_SLUG)) {
        await openDocument(HOME_SLUG);   // the home page is present by definition
      } else {
        renderAll();
      }
    }

    // KaTeX/marked are loaded with defer: wait for full load.
    if (document.readyState === "complete") init();
    else window.addEventListener("load", init);
  })();
  </script>
</body>
</html>
