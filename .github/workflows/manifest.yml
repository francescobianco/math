name: Rebuild manifest

# Rebuilds index.json (the wiki tree) at the project root whenever a .md
# document under library/ is added, modified, or removed on main.
on:
  push:
    branches: [main]
    paths:
      - "library/**.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild index.json
        run: make build

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore(wiki): rebuild index.json"
            git push
          else
            echo "Manifest already up to date."
          fi
