name: Rebuild manifest

# Rebuilds content/index.json (the wiki tree) whenever a .md document is
# added, modified, or removed on main.
on:
  push:
    branches: [main]
    paths:
      - "content/**.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild content/index.json
        run: make build

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- content/index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/index.json
            git commit -m "chore(wiki): rebuild content/index.json"
            git push
          else
            echo "Manifest already up to date."
          fi
